<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise GRC Platform – Enhanced Risk & Controls</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui;background:#0a0c12;color:#e2e8f0;display:flex}
        .sidebar{width:280px;background:#11161f;border-right:1px solid #2d3748;min-height:100vh;position:fixed;overflow-y:auto}
        .logo{padding:20px;font-size:20px;font-weight:bold;border-bottom:1px solid #2d3748;color:#7c6af7}
        .nav{padding:16px 8px}
        .nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;border:none;color:#94a3b8;font-size:14px;text-align:left;border-radius:8px;cursor:pointer;margin-bottom:2px}
        .nav-item:hover{background:#1a202c;color:white}
        .nav-item.active{background:#7c6af7;color:white}
        .main{margin-left:280px;flex:1;min-height:100vh}
        .topbar{padding:16px 24px;background:#11161f;border-bottom:1px solid #2d3748;display:flex;justify-content:space-between}
        .topbar-title{font-size:20px;font-weight:600}
        .content{padding:24px}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{background:#11161f;border:1px solid #2d3748;border-radius:12px;padding:16px}
        .stat-value{font-size:28px;font-weight:700;color:#7c6af7}
        .btn{background:#7c6af7;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
        .btn-outline{background:transparent;border:1px solid #4a5568;color:#cbd5e1}
        table{width:100%;border-collapse:collapse;margin-top:16px;overflow-x:auto;display:block}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #2d3748}
        .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
        .badge-critical{background:#ef444420;color:#ef4444}
        .badge-high{background:#f59e0b20;color:#f59e0b}
        .badge-medium{background:#3b82f620;color:#60a5fa}
        .badge-low{background:#10b98120;color:#10b981}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal{background:#1a202c;border-radius:16px;width:700px;max-width:90%;padding:24px;max-height:80vh;overflow-y:auto}
        .form-group{margin-bottom:16px}
        input,select,textarea{width:100%;background:#0f1117;border:1px solid #2d3748;padding:8px 12px;border-radius:8px;color:white}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .hidden{display:none}
        .toast{position:fixed;bottom:20px;right:20px;background:#1e293b;padding:12px 20px;border-radius:8px;z-index:1100}
        .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
        #loginOverlay{position:fixed;inset:0;background:#0a0c12;display:flex;align-items:center;justify-content:center;z-index:2000}
        .login-card{background:#11161f;border:1px solid #2d3748;border-radius:16px;padding:32px;width:350px;text-align:center}
        .login-card input{margin:16px 0}
        .error-msg{color:#ef4444;font-size:13px;margin-top:8px}
        @media (max-width:768px){.sidebar{width:220px}.main{margin-left:220px}.chart-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div id="loginOverlay"><div class="login-card"><h2>🔐 GRC Enterprise</h2><p style="margin:16px 0;color:#94a3b8">Enter password to access</p><input type="password" id="passwordInput" placeholder="Password" autofocus><button class="btn" id="loginBtn" style="width:100%">Login</button><div id="loginError" class="error-msg"></div></div></div>
<div id="grcApp" style="display:none"><div class="sidebar"><div class="logo">🎯 GRC Enterprise</div><div class="nav" id="navContainer"></div></div><div class="main" id="mainContent"></div></div>
<div id="modal" class="modal-overlay hidden"><div class="modal"><div id="modalBody"></div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveModal()">Save</button></div></div></div>
<div id="toast" class="toast hidden"></div>
<script>
// Password handling (same as before)
const DEFAULT_PASS_B64 = btoa("admin123");
let storedPassword = localStorage.getItem('grc_password_hash') || DEFAULT_PASS_B64;
if(!localStorage.getItem('grc_password_hash')) localStorage.setItem('grc_password_hash', DEFAULT_PASS_B64);
function verifyPassword(plain){ return btoa(plain) === storedPassword; }
function setNewPassword(plain){ localStorage.setItem('grc_password_hash', btoa(plain)); toast("Password changed. Please login again."); logout(); }
function logout(){ sessionStorage.removeItem('grc_logged_in'); document.getElementById('grcApp').style.display='none'; document.getElementById('loginOverlay').style.display='flex'; document.getElementById('passwordInput').value=''; }
function checkLogin(){ if(sessionStorage.getItem('grc_logged_in')==='true'){ document.getElementById('loginOverlay').style.display='none'; document.getElementById('grcApp').style.display='block'; initApp(); } else { document.getElementById('loginOverlay').style.display='flex'; document.getElementById('grcApp').style.display='none'; } }
document.getElementById('loginBtn').addEventListener('click',()=>{ const pwd=document.getElementById('passwordInput').value; if(verifyPassword(pwd)){ sessionStorage.setItem('grc_logged_in','true'); checkLogin(); } else { document.getElementById('loginError').innerText='Incorrect password.'; } });
document.getElementById('passwordInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });

// ---------- Enhanced Data Model ----------
const STORE_KEY='grc_enterprise_v3';
let data = JSON.parse(localStorage.getItem(STORE_KEY)) || {
    risks: [],
    riskAppetite: { Cyber: "Medium", Compliance: "Low", Financial: "Medium", Operational: "High", Strategic: "Medium" },
    assets: [],
    businessProcesses: [],
    orgUnits: [],
    controls: [],
    actionPlans: [],
    issues: [],
    incidents: [],
    vendors: [],
    compliance: [],
    auditFindings: [],
    evidence: [],
    kris: [],
    workflows: [],
    auditLog: []
};

// Seed demo data with all new fields
if(data.risks.length === 0){
    data.risks = [{
        id: "RSK-001", name: "Data Breach", description: "Unauthorized access to sensitive data", category: "Cyber", subCategory: "Data Security",
        businessUnit: "IT", department: "Infrastructure", owner: "Ahmed", dateIdentified: "2025-01-15", lastReviewDate: "2025-06-01",
        likelihood: 4, impact: 5, inherentScore: 20, residualScore: 8, riskRating: "High", trend: "Increasing", riskVelocity: "High", confidenceLevel: "Medium",
        treatmentStrategy: "Mitigate", treatmentStatus: "In Progress", targetResidualScore: 5, targetClosureDate: "2025-09-30", riskAccepted: "No", acceptedBy: "Risk Committee"
    },{
        id: "RSK-002", name: "Supply Chain Disruption", description: "Key supplier failure", category: "Operational", subCategory: "Logistics",
        businessUnit: "Operations", department: "Procurement", owner: "Sara", dateIdentified: "2025-02-01", lastReviewDate: "2025-06-15",
        likelihood: 3, impact: 4, inherentScore: 12, residualScore: 6, riskRating: "Medium", trend: "Stable", riskVelocity: "Medium", confidenceLevel: "High",
        treatmentStrategy: "Transfer", treatmentStatus: "Not Started", targetResidualScore: 4, targetClosureDate: "2025-08-30", riskAccepted: "No", acceptedBy: ""
    },{
        id: "RSK-003", name: "GDPR Fine", description: "Non-compliance with data protection", category: "Compliance", subCategory: "Regulatory",
        businessUnit: "Legal", department: "Compliance", owner: "Khalid", dateIdentified: "2025-01-20", lastReviewDate: "2025-05-20",
        likelihood: 2, impact: 5, inherentScore: 10, residualScore: 4, riskRating: "Medium", trend: "Decreasing", riskVelocity: "Low", confidenceLevel: "High",
        treatmentStrategy: "Mitigate", treatmentStatus: "In Progress", targetResidualScore: 3, targetClosureDate: "2025-07-31", riskAccepted: "No", acceptedBy: ""
    }];
    data.controls = [{
        id: "CTL-001", name: "Multi-Factor Authentication", type: "Preventive", effectiveness: 90, owner: "IT", lastTested: "2025-03-01",
        linkedControls: "MFA, DLP", controlCount: 2, controlStatus: "Effective"
    },{
        id: "CTL-002", name: "Vendor Security Assessment", type: "Detective", effectiveness: 70, owner: "Procurement", lastTested: "2025-02-15",
        linkedControls: "Vendor audits", controlCount: 1, controlStatus: "Partially Effective"
    }];
    // other modules minimal demo
    data.assets = [{ id: "AST-001", name: "Customer DB", type: "Database", criticality: "Critical", owner: "IT", location: "AWS", riskIds: ["RSK-001"] }];
    data.businessProcesses = [{ id: "PROC-001", name: "Payroll", owner: "Finance", assets: [], risks: [] }];
    data.orgUnits = [{ id: "BU-1", name: "Finance", type: "Business Unit" }];
    data.actionPlans = [{ id: "ACT-001", title: "Implement MFA", owner: "Ahmed", dueDate: "2025-06-01", progress: 60, status: "In Progress", riskId: "RSK-001" }];
    data.issues = [{ id: "ISS-001", title: "Phishing high rate", source: "Incident", priority: "High", owner: "IT", dueDate: "2025-05-01", status: "Open", riskId: "RSK-001" }];
    data.incidents = [{ id: "INC-001", title: "Phishing email", type: "Security", date: "2025-02-10", status: "Investigating", riskId: "RSK-001" }];
    data.vendors = [{ id: "VEN-001", name: "Cloud Provider", service: "IaaS", criticality: "High", contractExpiry: "2026-12-31", score: 85 }];
    data.compliance = [{ framework: "ISO 27001", requirement: "Access Control", status: "Partial", owner: "IT", dueDate: "2025-12-31", progress: 60, mappedControls: ["CTL-001"] }];
    data.auditFindings = [{ id: "AUD-001", title: "Weak password", severity: "High", auditType: "Internal", owner: "IT", status: "Open", dueDate: "2025-04-30" }];
    data.evidence = [{ id: "EVD-001", name: "MFA config", type: "Screenshot", linkedTo: "CTL-001", uploadDate: "2025-03-01" }];
    data.kris = [{ name: "Failed Logins", current: 320, threshold: 500, unit: "count" }];
    saveData();
}
function saveData(){ localStorage.setItem(STORE_KEY,JSON.stringify(data)); addAuditLog("Data saved"); }
function addAuditLog(action){ data.auditLog.unshift({timestamp:new Date().toISOString(),user:"admin",action}); if(data.auditLog.length>100) data.auditLog.pop(); saveData(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); }

// Helper functions
function getRiskRating(score){ if(score>=16) return "Critical"; if(score>=9) return "High"; if(score>=4) return "Medium"; return "Low"; }
function getRiskRatingClass(score){ return "badge-"+getRiskRating(score).toLowerCase(); }

// ---------- Render Risk Register (full fields) ----------
function renderRiskRegister(){
    let html = `<div class="topbar"><div class="topbar-title">Risk Register</div><button class="btn" onclick="openModal('risk')">+ New Risk</button></div>
    <div class="content"><div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>Risk Name</th><th>Category</th><th>Sub Cat</th><th>Business Unit</th><th>Department</th><th>Owner</th><th>Inherent</th><th>Residual</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    data.risks.forEach(r => {
        html += `<tr>
            <td>${r.id}</td><td>${r.name}</td><td>${r.category}</td><td>${r.subCategory||''}</td>
            <td>${r.businessUnit||''}</td><td>${r.department||''}</td><td>${r.owner}</td>
            <td>${r.inherentScore}</td><td>${r.residualScore}</td>
            <td><span class="badge ${getRiskRatingClass(r.inherentScore)}">${getRiskRating(r.inherentScore)}</span></td>
            <td>${r.treatmentStatus||'Open'}</td>
            <td><button class="btn-outline" onclick="editRisk('${r.id}')">Edit</button> <button class="btn-outline" onclick="deleteRisk('${r.id}')">Del</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}

// ---------- Risk Assessment & Treatment (combined tab) ----------
function renderRiskAssessment(){
    let html = `<div class="topbar"><div class="topbar-title">Risk Assessment & Treatment</div></div>
    <div class="content"><div style="overflow-x:auto"><table><thead><tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Inherent</th><th>Residual</th><th>Rating</th><th>Trend</th><th>Velocity</th><th>Confidence</th><th>Treatment</th><th>Status</th><th>Target Residual</th><th>Target Date</th><th>Accepted?</th><th>Action</th></tr></thead><tbody>`;
    data.risks.forEach(r => {
        html += `<tr>
            <td>${r.name}</td>
            <td><input type="number" id="lik-${r.id}" value="${r.likelihood}" min="1" max="5" style="width:60px"></td>
            <td><input type="number" id="imp-${r.id}" value="${r.impact}" min="1" max="5" style="width:60px"></td>
            <td id="inh-${r.id}">${r.inherentScore}</td>
            <td><input type="number" id="res-${r.id}" value="${r.residualScore}" style="width:60px"></td>
            <td><span class="badge ${getRiskRatingClass(r.inherentScore)}">${getRiskRating(r.inherentScore)}</span></td>
            <td><select id="trend-${r.id}"><option ${r.trend==='Increasing'?'selected':''}>Increasing</option><option ${r.trend==='Stable'?'selected':''}>Stable</option><option ${r.trend==='Decreasing'?'selected':''}>Decreasing</option></select></td>
            <td><select id="vel-${r.id}"><option ${r.riskVelocity==='High'?'selected':''}>High</option><option ${r.riskVelocity==='Medium'?'selected':''}>Medium</option><option ${r.riskVelocity==='Low'?'selected':''}>Low</option></select></td>
            <td><select id="conf-${r.id}"><option ${r.confidenceLevel==='High'?'selected':''}>High</option><option ${r.confidenceLevel==='Medium'?'selected':''}>Medium</option><option ${r.confidenceLevel==='Low'?'selected':''}>Low</option></select></td>
            <td><select id="strat-${r.id}"><option ${r.treatmentStrategy==='Mitigate'?'selected':''}>Mitigate</option><option ${r.treatmentStrategy==='Transfer'?'selected':''}>Transfer</option><option ${r.treatmentStrategy==='Accept'?'selected':''}>Accept</option><option ${r.treatmentStrategy==='Avoid'?'selected':''}>Avoid</option></select></td>
            <td><select id="treatStatus-${r.id}"><option ${r.treatmentStatus==='Not Started'?'selected':''}>Not Started</option><option ${r.treatmentStatus==='In Progress'?'selected':''}>In Progress</option><option ${r.treatmentStatus==='Completed'?'selected':''}>Completed</option></select></td>
            <td><input type="number" id="targetRes-${r.id}" value="${r.targetResidualScore||0}" style="width:60px"></td>
            <td><input type="date" id="targetDate-${r.id}" value="${r.targetClosureDate||''}"></td>
            <td><select id="accepted-${r.id}"><option ${r.riskAccepted==='Yes'?'selected':''}>Yes</option><option ${r.riskAccepted==='No'?'selected':''}>No</option></select></td>
            <td><button class="btn" onclick="updateRiskAssessment('${r.id}')">Update</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}
window.updateRiskAssessment = function(riskId){
    const r = data.risks.find(r=>r.id===riskId);
    if(r){
        r.likelihood = parseInt(document.getElementById(`lik-${riskId}`).value);
        r.impact = parseInt(document.getElementById(`imp-${riskId}`).value);
        r.inherentScore = r.likelihood * r.impact;
        r.residualScore = parseInt(document.getElementById(`res-${riskId}`).value);
        r.trend = document.getElementById(`trend-${riskId}`).value;
        r.riskVelocity = document.getElementById(`vel-${riskId}`).value;
        r.confidenceLevel = document.getElementById(`conf-${riskId}`).value;
        r.treatmentStrategy = document.getElementById(`strat-${riskId}`).value;
        r.treatmentStatus = document.getElementById(`treatStatus-${riskId}`).value;
        r.targetResidualScore = parseInt(document.getElementById(`targetRes-${riskId}`).value);
        r.targetClosureDate = document.getElementById(`targetDate-${riskId}`).value;
        r.riskAccepted = document.getElementById(`accepted-${riskId}`).value;
        saveData();
        toast('Risk assessment updated');
        renderRiskAssessment();
    }
};

// ---------- Controls (enhanced) ----------
function renderControlLibrary(){
    let html = `<div class="topbar"><div class="topbar-title">Control Library</div><button class="btn" onclick="openModal('control')">+ Add Control</button></div>
    <div class="content"><div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Effectiveness</th><th>Owner</th><th>Last Tested</th><th>Linked Controls</th><th>Control Count</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    data.controls.forEach(c => {
        html += `<tr>
            <td>${c.id}</td><td>${c.name}</td><td>${c.type}</td><td>${c.effectiveness}%</td>
            <td>${c.owner}</td><td>${c.lastTested}</td>
            <td>${c.linkedControls||''}</td><td>${c.controlCount||0}</td>
            <td><span class="badge ${c.controlStatus==='Effective'?'badge-medium':'badge-critical'}">${c.controlStatus||''}</span></td>
            <td><button class="btn-outline" onclick="editControl('${c.id}')">Edit</button> <button class="btn-outline" onclick="deleteControl('${c.id}')">Del</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}
window.editControl = function(id){ openModal('control', data.controls.find(c=>c.id===id)); };
window.deleteControl = function(id){ if(confirm('Delete control?')){ data.controls = data.controls.filter(c=>c.id!==id); saveData(); renderControlLibrary(); toast('Deleted'); } };

// ---------- Modal for Add/Edit Risk (includes all new fields) ----------
let currentModalType = null, currentEditId = null;
window.openModal = function(type, item){
    currentModalType = type;
    currentEditId = item?.id || null;
    let form = '';
    if(type === 'risk'){
        const r = item || {};
        form = `<div class="form-row"><div class="form-group"><label>Risk Name</label><input id="riskName" value="${r.name||''}"></div><div class="form-group"><label>Risk ID</label><input id="riskId" value="${r.id||`RSK-${data.risks.length+1}`}"></div></div>
        <div class="form-group"><label>Description</label><textarea id="riskDesc">${r.description||''}</textarea></div>
        <div class="form-row"><div class="form-group"><label>Category</label><select id="riskCat"><option ${r.category==='Cyber'?'selected':''}>Cyber</option><option ${r.category==='Operational'?'selected':''}>Operational</option><option ${r.category==='Compliance'?'selected':''}>Compliance</option><option ${r.category==='Financial'?'selected':''}>Financial</option><option ${r.category==='Strategic'?'selected':''}>Strategic</option></select></div>
        <div class="form-group"><label>Sub Category</label><input id="riskSubCat" value="${r.subCategory||''}"></div></div>
        <div class="form-row"><div class="form-group"><label>Business Unit</label><input id="riskBU" value="${r.businessUnit||''}"></div><div class="form-group"><label>Department</label><input id="riskDept" value="${r.department||''}"></div></div>
        <div class="form-row"><div class="form-group"><label>Risk Owner</label><input id="riskOwner" value="${r.owner||''}"></div><div class="form-group"><label>Date Identified</label><input type="date" id="riskDateId" value="${r.dateIdentified||''}"></div></div>
        <div class="form-row"><div class="form-group"><label>Last Review Date</label><input type="date" id="riskLastReview" value="${r.lastReviewDate||''}"></div><div class="form-group"><label>Likelihood (1-5)</label><input type="number" id="riskLik" value="${r.likelihood||3}" min="1" max="5"></div></div>
        <div class="form-row"><div class="form-group"><label>Impact (1-5)</label><input type="number" id="riskImp" value="${r.impact||3}" min="1" max="5"></div><div class="form-group"><label>Residual Score</label><input type="number" id="riskRes" value="${r.residualScore||0}"></div></div>
        <div class="form-row"><div class="form-group"><label>Trend</label><select id="riskTrend"><option ${r.trend==='Increasing'?'selected':''}>Increasing</option><option ${r.trend==='Stable'?'selected':''}>Stable</option><option ${r.trend==='Decreasing'?'selected':''}>Decreasing</option></select></div>
        <div class="form-group"><label>Risk Velocity</label><select id="riskVel"><option ${r.riskVelocity==='High'?'selected':''}>High</option><option ${r.riskVelocity==='Medium'?'selected':''}>Medium</option><option ${r.riskVelocity==='Low'?'selected':''}>Low</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Confidence Level</label><select id="riskConf"><option ${r.confidenceLevel==='High'?'selected':''}>High</option><option ${r.confidenceLevel==='Medium'?'selected':''}>Medium</option><option ${r.confidenceLevel==='Low'?'selected':''}>Low</option></select></div>
        <div class="form-group"><label>Treatment Strategy</label><select id="riskTreatStrat"><option ${r.treatmentStrategy==='Mitigate'?'selected':''}>Mitigate</option><option ${r.treatmentStrategy==='Transfer'?'selected':''}>Transfer</option><option ${r.treatmentStrategy==='Accept'?'selected':''}>Accept</option><option ${r.treatmentStrategy==='Avoid'?'selected':''}>Avoid</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Treatment Status</label><select id="riskTreatStatus"><option ${r.treatmentStatus==='Not Started'?'selected':''}>Not Started</option><option ${r.treatmentStatus==='In Progress'?'selected':''}>In Progress</option><option ${r.treatmentStatus==='Completed'?'selected':''}>Completed</option></select></div>
        <div class="form-group"><label>Target Residual Score</label><input type="number" id="riskTargetRes" value="${r.targetResidualScore||0}"></div></div>
        <div class="form-row"><div class="form-group"><label>Target Closure Date</label><input type="date" id="riskTargetDate" value="${r.targetClosureDate||''}"></div>
        <div class="form-group"><label>Risk Accepted</label><select id="riskAccepted"><option ${r.riskAccepted==='Yes'?'selected':''}>Yes</option><option ${r.riskAccepted==='No'?'selected':''}>No</option></select></div></div>
        <div class="form-group"><label>Accepted By</label><input id="riskAcceptedBy" value="${r.acceptedBy||''}"></div>`;
    } else if(type === 'control'){
        const c = item || {};
        form = `<div class="form-row"><div class="form-group"><label>Control Name</label><input id="ctrlName" value="${c.name||''}"></div><div class="form-group"><label>Control ID</label><input id="ctrlId" value="${c.id||`CTL-${data.controls.length+1}`}"></div></div>
        <div class="form-row"><div class="form-group"><label>Type</label><select id="ctrlType"><option ${c.type==='Preventive'?'selected':''}>Preventive</option><option ${c.type==='Detective'?'selected':''}>Detective</option><option ${c.type==='Corrective'?'selected':''}>Corrective</option></select></div>
        <div class="form-group"><label>Effectiveness (%)</label><input type="number" id="ctrlEff" value="${c.effectiveness||0}" min="0" max="100"></div></div>
        <div class="form-row"><div class="form-group"><label>Owner</label><input id="ctrlOwner" value="${c.owner||''}"></div><div class="form-group"><label>Last Tested</label><input type="date" id="ctrlLastTested" value="${c.lastTested||''}"></div></div>
        <div class="form-row"><div class="form-group"><label>Linked Controls</label><input id="ctrlLinked" value="${c.linkedControls||''}"></div><div class="form-group"><label>Control Count</label><input type="number" id="ctrlCount" value="${c.controlCount||0}"></div></div>
        <div class="form-group"><label>Control Status</label><select id="ctrlStatus"><option ${c.controlStatus==='Effective'?'selected':''}>Effective</option><option ${c.controlStatus==='Partially Effective'?'selected':''}>Partially Effective</option><option ${c.controlStatus==='Ineffective'?'selected':''}>Ineffective</option></select></div>`;
    } else {
        form = `<div class="form-group"><label>Name</label><input id="itemName"></div>`;
    }
    document.getElementById('modalBody').innerHTML = form;
    document.getElementById('modal').classList.remove('hidden');
};
window.closeModal = function(){ document.getElementById('modal').classList.add('hidden'); currentModalType=null; };
window.saveModal = function(){
    if(currentModalType === 'risk'){
        const newId = document.getElementById('riskId').value;
        const riskData = {
            id: newId,
            name: document.getElementById('riskName').value,
            description: document.getElementById('riskDesc').value,
            category: document.getElementById('riskCat').value,
            subCategory: document.getElementById('riskSubCat').value,
            businessUnit: document.getElementById('riskBU').value,
            department: document.getElementById('riskDept').value,
            owner: document.getElementById('riskOwner').value,
            dateIdentified: document.getElementById('riskDateId').value,
            lastReviewDate: document.getElementById('riskLastReview').value,
            likelihood: parseInt(document.getElementById('riskLik').value),
            impact: parseInt(document.getElementById('riskImp').value),
            inherentScore: parseInt(document.getElementById('riskLik').value) * parseInt(document.getElementById('riskImp').value),
            residualScore: parseInt(document.getElementById('riskRes').value),
            trend: document.getElementById('riskTrend').value,
            riskVelocity: document.getElementById('riskVel').value,
            confidenceLevel: document.getElementById('riskConf').value,
            treatmentStrategy: document.getElementById('riskTreatStrat').value,
            treatmentStatus: document.getElementById('riskTreatStatus').value,
            targetResidualScore: parseInt(document.getElementById('riskTargetRes').value),
            targetClosureDate: document.getElementById('riskTargetDate').value,
            riskAccepted: document.getElementById('riskAccepted').value,
            acceptedBy: document.getElementById('riskAcceptedBy').value
        };
        if(currentEditId){
            const idx = data.risks.findIndex(r=>r.id===currentEditId);
            if(idx!==-1) data.risks[idx] = riskData;
        } else {
            data.risks.push(riskData);
        }
    } else if(currentModalType === 'control'){
        const ctrlData = {
            id: document.getElementById('ctrlId').value,
            name: document.getElementById('ctrlName').value,
            type: document.getElementById('ctrlType').value,
            effectiveness: parseInt(document.getElementById('ctrlEff').value),
            owner: document.getElementById('ctrlOwner').value,
            lastTested: document.getElementById('ctrlLastTested').value,
            linkedControls: document.getElementById('ctrlLinked').value,
            controlCount: parseInt(document.getElementById('ctrlCount').value),
            controlStatus: document.getElementById('ctrlStatus').value
        };
        if(currentEditId){
            const idx = data.controls.findIndex(c=>c.id===currentEditId);
            if(idx!==-1) data.controls[idx] = ctrlData;
        } else {
            data.controls.push(ctrlData);
        }
    }
    saveData();
    closeModal();
    toast('Saved');
    renderCurrentPage();
};
window.editRisk = function(id){ openModal('risk', data.risks.find(r=>r.id===id)); };
window.deleteRisk = function(id){ if(confirm('Delete risk?')){ data.risks = data.risks.filter(r=>r.id!==id); saveData(); renderCurrentPage(); toast('Deleted'); } };

window.exportReport=function(){ const type=document.getElementById('reportType').value; let rows=[]; if(type==='risk') rows=[['ID','Name','Category','Inherent','Residual','Rating','Owner','Status'],...data.risks.map(r=>[r.id,r.name,r.category,r.inherentScore,r.residualScore,getRiskRating(r.inherentScore),r.owner,r.treatmentStatus])]; else if(type==='asset') rows=[['ID','Name','Type','Criticality','Owner'],...data.assets.map(a=>[a.id,a.name,a.type,a.criticality,a.owner])]; else rows=[['Framework','Requirement','Status','Progress'],...data.compliance.map(c=>[c.framework,c.requirement,c.status,c.progress])]; const csv=rows.map(row=>row.map(cell=>`"${cell}"`).join(',')).join('\n'); const blob=new Blob(["\uFEFF"+csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${type}_report.csv`; a.click(); toast('Report downloaded'); };

window.changePassword=function(){ const cur=document.getElementById('currentPwd').value; const newPwd=document.getElementById('newPwd').value; const conf=document.getElementById('confirmPwd').value; if(!verifyPassword(cur)){ document.getElementById('pwdMsg').innerText='Current password incorrect'; return; } if(newPwd.length<4){ document.getElementById('pwdMsg').innerText='Password must be at least 4 characters'; return; } if(newPwd!==conf){ document.getElementById('pwdMsg').innerText='Passwords do not match'; return; } setNewPassword(newPwd); document.getElementById('pwdMsg').innerText='Password changed. Please login again.'; setTimeout(()=>logout(),1500); };

function initApp(){
    const navContainer = document.getElementById('navContainer');
    navContainer.innerHTML = '';
    modules.forEach(mod => {
        const btn = document.createElement('button');
        btn.className = 'nav-item' + (mod.page===currentPage ? ' active' : '');
        btn.innerText = mod.label;
        btn.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            btn.classList.add('active');
            currentPage = mod.page;
            renderCurrentPage();
        };
        navContainer.appendChild(btn);
    });
    renderCurrentPage();
}
