<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise GRC Platform – 15+ Modules</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0c12;
            color: #e2e8f0;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #11161f;
            border-right: 1px solid #2d3748;
            min-height: 100vh;
            position: fixed;
            overflow-y: auto;
        }
        .logo {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #2d3748;
            color: #7c6af7;
        }
        .nav {
            padding: 16px 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 14px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .nav-item:hover {
            background: #1a202c;
            color: white;
        }
        .nav-item.active {
            background: #7c6af7;
            color: white;
        }
        /* Main content */
        .main {
            margin-left: 280px;
            flex: 1;
            min-height: 100vh;
        }
        .topbar {
            padding: 16px 24px;
            background: #11161f;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar-title {
            font-size: 20px;
            font-weight: 600;
        }
        .content {
            padding: 24px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #11161f;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 16px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #7c6af7;
        }
        .btn {
            background: #7c6af7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #4a5568;
            color: #cbd5e1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #2d3748;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-critical { background: #ef444420; color: #ef4444; }
        .badge-high { background: #f59e0b20; color: #f59e0b; }
        .badge-medium { background: #3b82f620; color: #60a5fa; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #1a202c;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
            padding: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        input, select, textarea {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3748;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
        }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) {
            .sidebar { width: 220px; }
            .main { margin-left: 220px; }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">🎯 GRC Enterprise</div>
    <div class="nav" id="navContainer"></div>
</div>
<div class="main" id="mainContent"></div>

<div id="modal" class="modal-overlay hidden">
    <div class="modal">
        <div id="modalBody"></div>
        <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="saveModal()">Save</button>
        </div>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
    // ---------- DATA MODEL (with demo data for all modules) ----------
    const STORE_KEY = 'grc_enterprise_v2';
    let data = JSON.parse(localStorage.getItem(STORE_KEY)) || {
        risks: [],
        riskAppetite: { Cyber: "Medium", Compliance: "Low", Financial: "Medium", Operational: "High", Strategic: "Medium" },
        assets: [],
        businessProcesses: [],
        orgUnits: [],
        controls: [],
        controlTests: [],
        actionPlans: [],
        issues: [],
        incidents: [],
        vendors: [],
        compliance: [],
        auditFindings: [],
        evidence: [],
        kris: [],
        workflows: [],
        auditLog: []
    };

    // Seed demo data if empty
    if (data.risks.length === 0) {
        data.risks = [
            { id: "RSK-001", name: "Data Breach", category: "Cyber", owner: "Ahmed", businessUnit: "IT", likelihood: 4, impact: 5, inherentScore: 20, residualScore: 8, status: "Open", controls: ["CTL-001"] },
            { id: "RSK-002", name: "Supply Chain Disruption", category: "Operational", owner: "Sara", businessUnit: "Ops", likelihood: 3, impact: 4, inherentScore: 12, residualScore: 6, status: "In Progress", controls: [] },
            { id: "RSK-003", name: "GDPR Fine", category: "Compliance", owner: "Khalid", businessUnit: "Legal", likelihood: 2, impact: 5, inherentScore: 10, residualScore: 4, status: "Open", controls: [] }
        ];
        data.assets = [
            { id: "AST-001", name: "Customer Database", type: "Database", criticality: "Critical", owner: "IT", location: "AWS", riskIds: ["RSK-001"] },
            { id: "AST-002", name: "HR System", type: "Application", criticality: "High", owner: "HR", location: "OnPrem", riskIds: [] }
        ];
        data.businessProcesses = [
            { id: "PROC-001", name: "Payroll", owner: "Finance", assets: ["AST-002"], risks: [] }
        ];
        data.orgUnits = [
            { id: "BU-1", name: "Finance", type: "Business Unit" },
            { id: "BU-2", name: "IT", type: "Business Unit" }
        ];
        data.controls = [
            { id: "CTL-001", name: "Multi-Factor Authentication", type: "Preventive", effectiveness: 90, owner: "IT", lastTested: "2025-03-01" }
        ];
        data.controlTests = [
            { id: "TEST-001", controlId: "CTL-001", testDate: "2025-03-01", result: "Pass", evidence: "screenshot.png" }
        ];
        data.actionPlans = [
            { id: "ACT-001", title: "Implement MFA for all apps", owner: "Ahmed", dueDate: "2025-06-01", progress: 60, status: "In Progress", riskId: "RSK-001" }
        ];
        data.issues = [
            { id: "ISS-001", title: "Phishing click rate high", source: "Incident", priority: "High", owner: "IT", dueDate: "2025-05-01", status: "Open", riskId: "RSK-001" }
        ];
        data.incidents = [
            { id: "INC-001", title: "Phishing email sent", type: "Security", date: "2025-02-10", status: "Investigating", riskId: "RSK-001" }
        ];
        data.vendors = [
            { id: "VEN-001", name: "Cloud Provider", service: "IaaS", criticality: "High", contractExpiry: "2026-12-31", score: 85 }
        ];
        data.compliance = [
            { framework: "ISO 27001", requirement: "Access Control", status: "Partial", owner: "IT", dueDate: "2025-12-31", progress: 60, mappedControls: ["CTL-001"] },
            { framework: "QCSF 2022", requirement: "Asset Management", status: "In Progress", owner: "CISO", dueDate: "2025-08-01", progress: 45, mappedControls: [] }
        ];
        data.auditFindings = [
            { id: "AUD-001", title: "Weak password policy", severity: "High", auditType: "Internal", owner: "IT", status: "Open", dueDate: "2025-04-30" }
        ];
        data.evidence = [
            { id: "EVD-001", name: "MFA config", type: "Screenshot", linkedTo: "CTL-001", uploadDate: "2025-03-01" }
        ];
        data.kris = [
            { name: "Failed Logins", current: 320, threshold: 500, unit: "count" },
            { name: "Open Vulnerabilities", current: 45, threshold: 100, unit: "count" }
        ];
        data.auditLog = [];
        saveData();
    }

    function saveData() {
        localStorage.setItem(STORE_KEY, JSON.stringify(data));
        addAuditLog("Data saved");
    }
    function addAuditLog(action) {
        data.auditLog.unshift({ timestamp: new Date().toISOString(), user: "admin", action });
        if (data.auditLog.length > 100) data.auditLog.pop();
        saveData();
    }
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 3000);
    }

    // ---------- Helper functions ----------
    function severityClass(score) {
        if (score >= 16) return "badge-critical";
        if (score >= 9) return "badge-high";
        if (score >= 4) return "badge-medium";
        return "";
    }

    // ---------- MODULE RENDERERS ----------
    let currentPage = "dashboard";
    let charts = {};

    function renderDashboard() {
        let html = `
            <div class="topbar"><div class="topbar-title">Executive Dashboard</div></div>
            <div class="content">
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-value">${data.risks.length}</div><div>Total Risks</div></div>
                    <div class="stat-card"><div class="stat-value">${data.risks.filter(r => r.inherentScore >= 16).length}</div><div>Critical Risks</div></div>
                    <div class="stat-card"><div class="stat-value">${data.issues.filter(i => i.status !== "Closed").length}</div><div>Open Issues</div></div>
                    <div class="stat-card"><div class="stat-value">${Math.round(data.compliance.reduce((a,c)=>a+c.progress,0)/data.compliance.length || 0)}%</div><div>Compliance Score</div></div>
                </div>
                <div class="chart-row">
                    <div class="stat-card"><canvas id="riskCategoryChart" style="height:200px"></canvas></div>
                    <div class="stat-card"><canvas id="riskTrendChart" style="height:200px"></canvas></div>
                </div>
                <div class="stat-card">
                    <h3>⚠️ Risks Above Appetite</h3>
                    <ul>${data.risks.filter(r => r.inherentScore > (data.riskAppetite[r.category] === "Low" ? 5 : data.riskAppetite[r.category] === "Medium" ? 10 : 15)).map(r => `<li>${r.name} (Score ${r.inherentScore})</li>`).join('') || '<li>None</li>'}</ul>
                </div>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        setTimeout(() => {
            try {
                const catMap = {};
                data.risks.forEach(r => catMap[r.category] = (catMap[r.category] || 0) + 1);
                new Chart(document.getElementById('riskCategoryChart'), {
                    type: 'bar',
                    data: { labels: Object.keys(catMap), datasets: [{ label: 'Risks', data: Object.values(catMap), backgroundColor: '#7c6af7' }] }
                });
                // dummy trend
                new Chart(document.getElementById('riskTrendChart'), {
                    type: 'line',
                    data: { labels: ['Jan', 'Feb', 'Mar'], datasets: [{ label: 'New Risks', data: [3, 5, 2], borderColor: '#f59e0b' }] }
                });
            } catch(e) { console.warn(e); }
        }, 50);
    }

    function renderRiskRegister() {
        let html = `
            <div class="topbar"><div class="topbar-title">Risk Register</div><button class="btn" onclick="openModal('risk')">+ New Risk</button></div>
            <div class="content">
                <table><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Inherent</th><th>Residual</th><th>Status</th><th>Owner</th><th>Actions</th></tr></thead><tbody>
                ${data.risks.map(r => `
                    <tr>
                        <td>${r.id}</td><td>${r.name}</td><td>${r.category}</td>
                        <td>${r.inherentScore}</td><td>${r.residualScore}</td>
                        <td><span class="badge ${severityClass(r.inherentScore)}">${r.status}</span></td>
                        <td>${r.owner}</td>
                        <td><button class="btn-outline" onclick="editRisk('${r.id}')">Edit</button> <button class="btn-outline" onclick="deleteRisk('${r.id}')">Del</button></td>
                    </tr>
                `).join('')}
                </tbody></table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderRiskAssessment() {
        let html = `
            <div class="topbar"><div class="topbar-title">Risk Assessment (Inherent → Residual)</div></div>
            <div class="content">
                <table><thead><tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Inherent</th><th>Controls</th><th>Residual</th><th>Action</th></tr></thead><tbody>
                ${data.risks.map(r => `
                    <tr>
                        <td>${r.name}</td>
                        <td><input type="number" id="lik-${r.id}" value="${r.likelihood}" min="1" max="5" style="width:70px"></td>
                        <td><input type="number" id="imp-${r.id}" value="${r.impact}" min="1" max="5" style="width:70px"></td>
                        <td id="inh-${r.id}">${r.inherentScore}</td>
                        <td>${r.controls?.join(',') || 'None'}</td>
                        <td><input type="number" id="res-${r.id}" value="${r.residualScore}" style="width:70px"></td>
                        <td><button class="btn" onclick="updateRiskScores('${r.id}')">Update</button></td>
                    </tr>
                `).join('')}
                </tbody></table>
                <div class="stat-card" style="margin-top:20px"><button class="btn" onclick="toast('Assessment campaign feature coming')">Launch Assessment Campaign</button></div>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.updateRiskScores = function(riskId) {
        const risk = data.risks.find(r => r.id === riskId);
        if (risk) {
            risk.likelihood = parseInt(document.getElementById(`lik-${riskId}`).value);
            risk.impact = parseInt(document.getElementById(`imp-${riskId}`).value);
            risk.inherentScore = risk.likelihood * risk.impact;
            risk.residualScore = parseInt(document.getElementById(`res-${riskId}`).value);
            saveData();
            toast('Risk scores updated');
            renderRiskAssessment();
        }
    };

    function renderRiskAppetite() {
        let html = `
            <div class="topbar"><div class="topbar-title">Risk Appetite Configuration</div></div>
            <div class="content">
                <table><thead><tr><th>Category</th><th>Appetite Level</th><th></th></tr></thead><tbody>
                ${Object.keys(data.riskAppetite).map(cat => `
                    <tr>
                        <td>${cat}</td>
                        <td><select id="app-${cat}"><option ${data.riskAppetite[cat]==='Low'?'selected':''}>Low</option><option ${data.riskAppetite[cat]==='Medium'?'selected':''}>Medium</option><option ${data.riskAppetite[cat]==='High'?'selected':''}>High</option></select></td>
                        <td><button class="btn" onclick="saveAppetite('${cat}')">Save</button></td>
                    </tr>
                `).join('')}
                </tbody></table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.saveAppetite = function(cat) {
        data.riskAppetite[cat] = document.getElementById(`app-${cat}`).value;
        saveData();
        toast('Risk appetite saved');
        renderRiskAppetite();
    };

    function renderAssetInventory() {
        let html = `
            <div class="topbar"><div class="topbar-title">Asset Inventory</div><button class="btn" onclick="openModal('asset')">+ Add Asset</button></div>
            <div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Criticality</th><th>Owner</th><th>Location</th><th>Risks</th></tr></thead><tbody>
            ${data.assets.map(a => `<tr><td>${a.id}</td><td>${a.name}</td><td>${a.type}</td><td>${a.criticality}</td><td>${a.owner}</td><td>${a.location}</td><td>${a.riskIds?.join(',') || ''}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderBusinessProcess() {
        let html = `
            <div class="topbar"><div class="topbar-title">Business Processes</div><button class="btn" onclick="openModal('process')">+ Add Process</button></div>
            <div class="content"><table><thead><tr><th>ID</th><th>Process Name</th><th>Owner</th><th>Assets</th><th>Risks</th></tr></thead><tbody>
            ${data.businessProcesses.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.owner}</td><td>${p.assets?.join(',') || ''}</td><td>${p.risks?.join(',') || ''}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderOrgStructure() {
        let html = `
            <div class="topbar"><div class="topbar-title">Organizational Structure</div><button class="btn" onclick="openModal('orgUnit')">+ Add Unit</button></div>
            <div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th></tr></thead><tbody>
            ${data.orgUnits.map(u => `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.type}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderControlLibrary() {
        let html = `
            <div class="topbar"><div class="topbar-title">Control Library</div><button class="btn" onclick="openModal('control')">+ Add Control</button></div>
            <div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Effectiveness</th><th>Owner</th><th>Last Tested</th></tr></thead><tbody>
            ${data.controls.map(c => `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.type}</td><td>${c.effectiveness}%</td><td>${c.owner}</td><td>${c.lastTested}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderControlTesting() {
        let html = `
            <div class="topbar"><div class="topbar-title">Control Testing</div><button class="btn" onclick="openModal('test')">+ New Test</button></div>
            <div class="content"><table><thead><tr><th>Control ID</th><th>Test Date</th><th>Result</th><th>Evidence</th></tr></thead><tbody>
            ${data.controlTests.map(t => `<tr><td>${t.controlId}</td><td>${t.testDate}</td><td><span class="badge ${t.result==='Pass'?'badge-medium':''}">${t.result}</span></td><td>${t.evidence}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderActionPlans() {
        let html = `
            <div class="topbar"><div class="topbar-title">Action Plans</div><button class="btn" onclick="openModal('action')">+ Add Action</button></div>
            <div class="content"><table><thead><tr><th>Action</th><th>Owner</th><th>Due Date</th><th>Progress</th><th>Status</th></tr></thead><tbody>
            ${data.actionPlans.map(a => `<tr><td>${a.title}</td><td>${a.owner}</td><td>${a.dueDate}</td><td>${a.progress}%</td><td>${a.status}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderIssues() {
        let html = `
            <div class="topbar"><div class="topbar-title">Issues Management</div><button class="btn" onclick="openModal('issue')">+ Add Issue</button></div>
            <div class="content"><table><thead><tr><th>Title</th><th>Source</th><th>Priority</th><th>Owner</th><th>Due Date</th><th>Status</th></tr></thead><tbody>
            ${data.issues.map(i => `<tr><td>${i.title}</td><td>${i.source}</td><td>${i.priority}</td><td>${i.owner}</td><td>${i.dueDate}</td><td>${i.status}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderIncidents() {
        let html = `
            <div class="topbar"><div class="topbar-title">Incident Register</div><button class="btn" onclick="openModal('incident')">+ Log Incident</button></div>
            <div class="content"><table><thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Date</th><th>Status</th><th>Risk</th></tr></thead><tbody>
            ${data.incidents.map(i => `<tr><td>${i.id}</td><td>${i.title}</td><td>${i.type}</td><td>${i.date}</td><td>${i.status}</td><td>${i.riskId || ''}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderVendorRisk() {
        let html = `
            <div class="topbar"><div class="topbar-title">Vendor Risk Management</div><button class="btn" onclick="openModal('vendor')">+ Add Vendor</button></div>
            <div class="content"><table><thead><tr><th>Vendor</th><th>Service</th><th>Criticality</th><th>Contract Expiry</th><th>Assessment Score</th></tr></thead><tbody>
            ${data.vendors.map(v => `<tr><td>${v.name}</td><td>${v.service}</td><td>${v.criticality}</td><td>${v.contractExpiry}</td><td>${v.score}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderCompliance() {
        let html = `
            <div class="topbar"><div class="topbar-title">Compliance Register (ISO, NIST, QCSF 2022)</div><button class="btn" onclick="openModal('compliance')">+ Add Requirement</button></div>
            <div class="content"><table><thead><tr><th>Framework</th><th>Requirement</th><th>Status</th><th>Progress</th><th>Owner</th><th>Due Date</th></tr></thead><tbody>
            ${data.compliance.map(c => `<tr><td>${c.framework}</td><td>${c.requirement}</td><td>${c.status}</td><td>${c.progress}%</td><td>${c.owner}</td><td>${c.dueDate}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderAuditFindings() {
        let html = `
            <div class="topbar"><div class="topbar-title">Audit Findings</div><button class="btn" onclick="openModal('audit')">+ Add Finding</button></div>
            <div class="content"><table><thead><tr><th>Finding</th><th>Severity</th><th>Audit Type</th><th>Status</th><th>Due Date</th></tr></thead><tbody>
            ${data.auditFindings.map(f => `<tr><td>${f.title}</td><td><span class="badge ${f.severity==='High'?'badge-critical':'badge-medium'}">${f.severity}</span></td><td>${f.auditType}</td><td>${f.status}</td><td>${f.dueDate}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderEvidence() {
        let html = `
            <div class="topbar"><div class="topbar-title">Evidence Repository</div><button class="btn" onclick="openModal('evidence')">+ Upload Evidence</button></div>
            <div class="content"><table><thead><tr><th>Name</th><th>Type</th><th>Linked To</th><th>Upload Date</th></tr></thead><tbody>
            ${data.evidence.map(e => `<tr><td>${e.name}</td><td>${e.type}</td><td>${e.linkedTo}</td><td>${e.uploadDate}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderKRI() {
        let html = `
            <div class="topbar"><div class="topbar-title">Key Risk Indicators (KRIs)</div><button class="btn" onclick="openModal('kri')">+ Add KRI</button></div>
            <div class="content"><table><thead><tr><th>KRI</th><th>Current</th><th>Threshold</th><th>Status</th></tr></thead><tbody>
            ${data.kris.map(k => `<tr><td>${k.name}</td><td>${k.current}</td><td>${k.threshold}</td><td><span class="badge ${k.current > k.threshold ? 'badge-critical' : 'badge-medium'}">${k.current > k.threshold ? 'Exceeded' : 'OK'}</span></td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderWorkflow() {
        let html = `
            <div class="topbar"><div class="topbar-title">Workflow Approvals</div></div>
            <div class="content"><div class="stat-card"><h3>Pending Approvals</h3><ul>${data.workflows.filter(w=>w.status==='pending').map(w=>`<li>${w.itemType}: ${w.itemName} - Requestor: ${w.requestor} <button class="btn" onclick="approveWorkflow('${w.id}')">Approve</button></li>`).join('') || '<li>No pending approvals</li>'}</ul><button class="btn" onclick="toast('Request approval feature coming')">Request Approval</button></div></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.approveWorkflow = function(id) {
        const w = data.workflows.find(w=>w.id===id);
        if(w) w.status='approved';
        saveData();
        renderWorkflow();
        toast('Approved');
    };

    function renderAuditTrail() {
        let html = `
            <div class="topbar"><div class="topbar-title">Audit Trail</div></div>
            <div class="content"><table><thead><tr><th>Timestamp</th><th>User</th><th>Action</th></tr></thead><tbody>
            ${data.auditLog.slice(0,50).map(log => `<tr><td>${new Date(log.timestamp).toLocaleString()}</td><td>${log.user}</td><td>${log.action}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderReports() {
        let html = `
            <div class="topbar"><div class="topbar-title">Reports</div></div>
            <div class="content"><div class="stat-card"><h3>Generate Report</h3><select id="reportType"><option value="risk">Risk Register</option><option value="asset">Asset Inventory</option><option value="compliance">Compliance Status</option></select><button class="btn" onclick="exportReport()">Export CSV</button></div></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }
    window.exportReport = function() {
        const type = document.getElementById('reportType').value;
        let rows = [];
        if (type === 'risk') rows = [['ID','Name','Category','Inherent','Residual','Status'], ...data.risks.map(r=>[r.id,r.name,r.category,r.inherentScore,r.residualScore,r.status])];
        else if (type === 'asset') rows = [['ID','Name','Type','Criticality','Owner'], ...data.assets.map(a=>[a.id,a.name,a.type,a.criticality,a.owner])];
        else rows = [['Framework','Requirement','Status','Progress'], ...data.compliance.map(c=>[c.framework,c.requirement,c.status,c.progress])];
        const csv = rows.map(row=>row.map(cell=>`"${cell}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${type}_report.csv`; a.click(); toast('Report downloaded');
    };

    // ---------- MODAL & CRUD ----------
    let currentModalType = null, currentEditId = null;
    window.openModal = function(type, id) {
        currentModalType = type;
        currentEditId = id;
        let form = '';
        if (type === 'risk') form = `<div class="form-group"><label>Risk Name</label><input id="riskName"></div><div class="form-group"><label>Category</label><select id="riskCat"><option>Cyber</option><option>Operational</option><option>Compliance</option><option>Financial</option></select></div><div class="form-group"><label>Likelihood (1-5)</label><input id="riskLik" type="number" min="1" max="5"></div><div class="form-group"><label>Impact (1-5)</label><input id="riskImp" type="number" min="1" max="5"></div><div class="form-group"><label>Owner</label><input id="riskOwner"></div>`;
        else if (type === 'asset') form = `<div class="form-group"><label>Asset Name</label><input id="assetName"></div><div class="form-group"><label>Type</label><input id="assetType"></div><div class="form-group"><label>Criticality</label><select id="assetCrit"><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div><div class="form-group"><label>Owner</label><input id="assetOwner"></div>`;
        else if (type === 'process') form = `<div class="form-group"><label>Process Name</label><input id="procName"></div><div class="form-group"><label>Owner</label><input id="procOwner"></div>`;
        else if (type === 'orgUnit') form = `<div class="form-group"><label>Unit Name</label><input id="unitName"></div><div class="form-group"><label>Type</label><select id="unitType"><option>Business Unit</option><option>Department</option><option>Location</option></select></div>`;
        else if (type === 'control') form = `<div class="form-group"><label>Control Name</label><input id="ctrlName"></div><div class="form-group"><label>Type</label><select id="ctrlType"><option>Preventive</option><option>Detective</option><option>Corrective</option></select></div>`;
        else if (type === 'test') form = `<div class="form-group"><label>Control ID</label><input id="testCtrlId"></div><div class="form-group"><label>Test Date</label><input type="date" id="testDate"></div><div class="form-group"><label>Result</label><select id="testResult"><option>Pass</option><option>Fail</option><option>Partial</option></select></div><div class="form-group"><label>Evidence ref</label><input id="testEvidence"></div>`;
        else if (type === 'action') form = `<div class="form-group"><label>Action Title</label><input id="actionTitle"></div><div class="form-group"><label>Owner</label><input id="actionOwner"></div><div class="form-group"><label>Due Date</label><input type="date" id="actionDue"></div><div class="form-group"><label>Progress (%)</label><input id="actionProgress" type="number"></div>`;
        else if (type === 'issue') form = `<div class="form-group"><label>Issue Title</label><input id="issueTitle"></div><div class="form-group"><label>Source</label><select id="issueSource"><option>Audit</option><option>Incident</option><option>Risk Assessment</option></select></div><div class="form-group"><label>Priority</label><select id="issuePriority"><option>High</option><option>Medium</option><option>Low</option></select></div>`;
        else if (type === 'incident') form = `<div class="form-group"><label>Incident Title</label><input id="incTitle"></div><div class="form-group"><label>Type</label><select id="incType"><option>Security</option><option>Operational</option><option>Privacy</option></select></div><div class="form-group"><label>Date</label><input type="date" id="incDate"></div>`;
        else if (type === 'vendor') form = `<div class="form-group"><label>Vendor Name</label><input id="venName"></div><div class="form-group"><label>Service</label><input id="venService"></div><div class="form-group"><label>Criticality</label><select id="venCrit"><option>High</option><option>Medium</option><option>Low</option></select></div>`;
        else if (type === 'compliance') form = `<div class="form-group"><label>Framework (e.g., QCSF 2022)</label><input id="compFw"></div><div class="form-group"><label>Requirement</label><input id="compReq"></div><div class="form-group"><label>Status</label><select id="compStatus"><option>Compliant</option><option>Partial</option><option>Non-Compliant</option></select></div><div class="form-group"><label>Progress %</label><input id="compProg" type="number"></div>`;
        else if (type === 'audit') form = `<div class="form-group"><label>Finding Title</label><input id="auditTitle"></div><div class="form-group"><label>Severity</label><select id="auditSev"><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div><div class="form-group"><label>Audit Type</label><select id="auditType"><option>Internal</option><option>External</option><option>Regulatory</option></select></div>`;
        else if (type === 'evidence') form = `<div class="form-group"><label>Evidence Name</label><input id="evName"></div><div class="form-group"><label>Type</label><select id="evType"><option>Screenshot</option><option>Document</option><option>Log</option></select></div><div class="form-group"><label>Linked To (control ID)</label><input id="evLink"></div>`;
        else if (type === 'kri') form = `<div class="form-group"><label>KRI Name</label><input id="kriName"></div><div class="form-group"><label>Threshold</label><input id="kriThresh" type="number"></div><div class="form-group"><label>Current Value</label><input id="kriCurrent" type="number"></div>`;
        document.getElementById('modalBody').innerHTML = form;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.closeModal = function() { document.getElementById('modal').classList.add('hidden'); currentModalType = null; };
    window.saveModal = function() {
        if (currentModalType === 'risk') {
            const newRisk = {
                id: `RSK-${data.risks.length+1}`,
                name: document.getElementById('riskName').value,
                category: document.getElementById('riskCat').value,
                likelihood: parseInt(document.getElementById('riskLik').value),
                impact: parseInt(document.getElementById('riskImp').value),
                inherentScore: parseInt(document.getElementById('riskLik').value) * parseInt(document.getElementById('riskImp').value),
                residualScore: 0,
                owner: document.getElementById('riskOwner').value,
                status: "Open",
                controls: []
            };
            data.risks.push(newRisk);
        } else if (currentModalType === 'asset') {
            data.assets.push({
                id: `AST-${data.assets.length+1}`,
                name: document.getElementById('assetName').value,
                type: document.getElementById('assetType').value,
                criticality: document.getElementById('assetCrit').value,
                owner: document.getElementById('assetOwner').value,
                location: "",
                riskIds: []
            });
        } else if (currentModalType === 'process') {
            data.businessProcesses.push({ id: `PROC-${data.businessProcesses.length+1}`, name: document.getElementById('procName').value, owner: document.getElementById('procOwner').value, assets: [], risks: [] });
        } else if (currentModalType === 'orgUnit') {
            data.orgUnits.push({ id: `UNIT-${data.orgUnits.length+1}`, name: document.getElementById('unitName').value, type: document.getElementById('unitType').value });
        } else if (currentModalType === 'control') {
            data.controls.push({ id: `CTL-${data.controls.length+1}`, name: document.getElementById('ctrlName').value, type: document.getElementById('ctrlType').value, effectiveness: 0, owner: "", lastTested: "" });
        } else if (currentModalType === 'test') {
            data.controlTests.push({ id: `TEST-${data.controlTests.length+1}`, controlId: document.getElementById('testCtrlId').value, testDate: document.getElementById('testDate').value, result: document.getElementById('testResult').value, evidence: document.getElementById('testEvidence').value });
        } else if (currentModalType === 'action') {
            data.actionPlans.push({ id: `ACT-${data.actionPlans.length+1}`, title: document.getElementById('actionTitle').value, owner: document.getElementById('actionOwner').value, dueDate: document.getElementById('actionDue').value, progress: parseInt(document.getElementById('actionProgress').value), status: "In Progress" });
        } else if (currentModalType === 'issue') {
            data.issues.push({ id: `ISS-${data.issues.length+1}`, title: document.getElementById('issueTitle').value, source: document.getElementById('issueSource').value, priority: document.getElementById('issuePriority').value, owner: "", dueDate: "", status: "Open" });
        } else if (currentModalType === 'incident') {
            data.incidents.push({ id: `INC-${data.incidents.length+1}`, title: document.getElementById('incTitle').value, type: document.getElementById('incType').value, date: document.getElementById('incDate').value, status: "Investigating", riskId: "" });
        } else if (currentModalType === 'vendor') {
            data.vendors.push({ id: `VEN-${data.vendors.length+1}`, name: document.getElementById('venName').value, service: document.getElementById('venService').value, criticality: document.getElementById('venCrit').value, contractExpiry: "", score: 0 });
        } else if (currentModalType === 'compliance') {
            data.compliance.push({ framework: document.getElementById('compFw').value, requirement: document.getElementById('compReq').value, status: document.getElementById('compStatus').value, owner: "", dueDate: "", progress: parseInt(document.getElementById('compProg').value), mappedControls: [] });
        } else if (currentModalType === 'audit') {
            data.auditFindings.push({ id: `AUD-${data.auditFindings.length+1}`, title: document.getElementById('auditTitle').value, severity: document.getElementById('auditSev').value, auditType: document.getElementById('auditType').value, status: "Open", dueDate: "" });
        } else if (currentModalType === 'evidence') {
            data.evidence.push({ id: `EVD-${data.evidence.length+1}`, name: document.getElementById('evName').value, type: document.getElementById('evType').value, linkedTo: document.getElementById('evLink').value, uploadDate: new Date().toISOString().slice(0,10) });
        } else if (currentModalType === 'kri') {
            data.kris.push({ name: document.getElementById('kriName').value, current: parseInt(document.getElementById('kriCurrent').value), threshold: parseInt(document.getElementById('kriThresh').value), unit: "count" });
        }
        saveData();
        closeModal();
        toast('Added successfully');
        renderCurrentPage();
    };
    window.deleteRisk = function(id) {
        if (confirm('Delete risk?')) {
            data.risks = data.risks.filter(r => r.id !== id);
            saveData();
            renderCurrentPage();
            toast('Deleted');
        }
    };
    window.editRisk = function(id) {
        const risk = data.risks.find(r => r.id === id);
        if (risk) openModal('risk', id);
    };

    function renderCurrentPage() {
        if (currentPage === 'dashboard') renderDashboard();
        else if (currentPage === 'riskRegister') renderRiskRegister();
        else if (currentPage === 'riskAssessment') renderRiskAssessment();
        else if (currentPage === 'riskAppetite') renderRiskAppetite();
        else if (currentPage === 'residualRisk') renderRiskAssessment();
        else if (currentPage === 'assetInventory') renderAssetInventory();
        else if (currentPage === 'businessProcess') renderBusinessProcess();
        else if (currentPage === 'orgStructure') renderOrgStructure();
        else if (currentPage === 'controlLibrary') renderControlLibrary();
        else if (currentPage === 'controlTesting') renderControlTesting();
        else if (currentPage === 'actionPlans') renderActionPlans();
        else if (currentPage === 'issueManagement') renderIssues();
        else if (currentPage === 'incidentRegister') renderIncidents();
        else if (currentPage === 'vendorRisk') renderVendorRisk();
        else if (currentPage === 'complianceRegister') renderCompliance();
        else if (currentPage === 'auditFindings') renderAuditFindings();
        else if (currentPage === 'evidenceRepo') renderEvidence();
        else if (currentPage === 'kriManagement') renderKRI();
        else if (currentPage === 'workflow') renderWorkflow();
        else if (currentPage === 'auditTrail') renderAuditTrail();
        else if (currentPage === 'reports') renderReports();
    }

    // Build navigation sidebar dynamically (exactly as shown in screenshot)
    const modules = [
        { page: "dashboard", label: "📊 Executive Dashboard" },
        { page: "riskRegister", label: "📋 Risk Register" },
        { page: "riskAssessment", label: "📝 Risk Assessment" },
        { page: "riskAppetite", label: "⚖️ Risk Appetite" },
        { page: "residualRisk", label: "🔄 Residual Risk" },
        { page: "assetInventory", label: "🏷️ Asset Inventory" },
        { page: "businessProcess", label: "🔁 Business Processes" },
        { page: "orgStructure", label: "🏢 Org Structure" },
        { page: "controlLibrary", label: "🔒 Control Library" },
        { page: "controlTesting", label: "🧪 Control Testing" },
        { page: "actionPlans", label: "✅ Action Plans" },
        { page: "issueManagement", label: "❗ Issues" },
        { page: "incidentRegister", label: "🚨 Incidents" },
        { page: "vendorRisk", label: "🏭 Vendor Risk" },
        { page: "complianceRegister", label: "📜 Compliance" },
        { page: "auditFindings", label: "🔍 Audit Findings" },
        { page: "evidenceRepo", label: "📎 Evidence" },
        { page: "kriManagement", label: "📈 KRIs" },
        { page: "workflow", label: "🔄 Workflow" },
        { page: "auditTrail", label: "📜 Audit Trail" },
        { page: "reports", label: "📑 Reports" }
    ];
    const navContainer = document.getElementById('navContainer');
    modules.forEach(mod => {
        const btn = document.createElement('button');
        btn.className = 'nav-item' + (mod.page === currentPage ? ' active' : '');
        btn.innerText = mod.label;
        btn.setAttribute('data-page', mod.page);
        btn.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            currentPage = mod.page;
            renderCurrentPage();
        };
        navContainer.appendChild(btn);
    });

    renderCurrentPage();
</script>
</body>
</html>
