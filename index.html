<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRC-Control — Full Risk & Asset Management + QCSF 2022 + Reports</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ========== COMPLETE CSS (full feature set) ========== */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;--border:#2a3352;--border2:#3a4a6b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--purple:#7c6af7;--purple2:#6355e0;--purple-bg:#1e1a3a;--teal:#10b981;--teal-bg:#0d2d22;--amber:#f59e0b;--amber-bg:#2d1f07;--red:#ef4444;--red-bg:#2d0f0f;--blue:#3b82f6;--blue-bg:#0f1f3a;--green:#22c55e;--green-bg:#0d2d1a;--radius:10px;--radius-sm:6px;--font:'Inter',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);min-height:100vh;position:fixed;height:100vh;overflow-y:auto}
.logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:var(--purple-bg);border:1px solid var(--purple);border-radius:8px;display:inline-flex;align-items:center;justify-content:center}
.logo-text{font-weight:600}
.nav{padding:12px 8px}
.nav-section{font-size:10px;color:var(--text3);padding:10px 8px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;background:none;border:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--purple-bg);color:var(--purple)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.main{margin-left:220px;flex:1}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:var(--purple);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(16,185,129,.2)}
.btn-sm{padding:4px 8px;font-size:11px}
.content{padding:24px 28px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-value{font-size:26px;font-weight:700}
.stat-label{font-size:12px;color:var(--text3)}
.kri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.kri-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.kri-value{font-size:22px;font-weight:700}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;margin-top:8px}
.progress-fill{height:100%;border-radius:3px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-top:20px;overflow-x:auto}
.section-header{padding:14px 18px;border-bottom:1px solid var(--border)}
.section-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 16px;text-align:left;border-bottom:1px solid rgba(42,51,82,.5)}
th{color:var(--text3);font-size:11px;font-weight:600}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-critical{background:rgba(239,68,68,.15);color:#f87171}
.badge-high{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-medium{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-low{background:rgba(34,197,94,.15);color:#4ade80}
.badge-open{background:rgba(239,68,68,.12);color:#f87171}
.badge-progress{background:rgba(245,158,11,.12);color:#fbbf24}
.badge-closed{background:rgba(34,197,94,.12);color:#4ade80}
.badge-compliant{background:rgba(34,197,94,.12);color:#4ade80}
.badge-noncompliant{background:rgba(239,68,68,.12);color:#f87171}
.badge-partial-c{background:rgba(245,158,11,.12);color:#fbbf24}
.badge-active{background:rgba(34,197,94,.12);color:#4ade80}
.badge-draft{background:rgba(100,116,139,.12);color:#94a3b8}
.badge-review{background:rgba(245,158,11,.12);color:#fbbf24}
.asset-risk-pill{display:inline-block;background:var(--bg4);padding:2px 8px;border-radius:12px;font-size:10px;margin:2px}
.action-buttons{white-space:nowrap}
.avatar{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--purple-bg);border:1px solid var(--purple);align-items:center;justify-content:center;font-size:10px;margin-right:6px}
.heatmap-grid{display:grid;grid-template-columns:30px repeat(5,1fr);gap:4px;margin-top:10px}
.hm-cell{background:rgba(59,130,246,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;padding:12px;cursor:pointer}
.hm-critical{background:rgba(239,68,68,.2);color:#f87171}
.hm-high{background:rgba(245,158,11,.2);color:#fbbf24}
.hm-medium{background:rgba(59,130,246,.2);color:#60a5fa}
.hm-low{background:rgba(34,197,94,.2);color:#4ade80}
.policy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.policy-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.policy-card-title{font-size:14px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header,.modal-footer{padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-footer{border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.page{display:none}
.page.active{display:block}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border-radius:8px;padding:12px 18px;font-size:13px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:900px){.stat-grid,.kri-grid,.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo"><div class="logo-icon">🛡️</div><div class="logo-text">GRC-Control<br><span style="font-size:10px">Risk & Assets</span></div></div>
  <div class="nav">
    <div class="nav-section">Workspace</div>

    <button class="nav-item" data-page="compliance">✅ Compliance</button>

    <button class="nav-item" data-page="reports">📑 Reports</button>
    <div class="nav-section">Settings</div>
    <button class="nav-item" data-page="email">📧 Email Alerts</button>
    <button class="nav-item" onclick="exportCSV()">📥 Export CSV</button>
  </div>
</nav>
<div class="main" id="main-content"></div>

<div class="modal-overlay" id="modal" style="display:none"><div class="modal"><div class="modal-header"><span class="modal-title" id="modal-title"></span><button class="btn btn-ghost" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveModal()">Save</button></div></div></div>
<div class="toast" id="toast">Saved</div>

<script>
// ======================== DATA MODEL (Full feature set) ========================
const STORE_KEY = 'grc_full_v9';
let data = JSON.parse(localStorage.getItem(STORE_KEY)) || {
  risks: [
    {id:'RSK-001',name:'Data breach via phishing',category:'Technology',likelihood:4,impact:5,owner:'Ahmed Al-Rashid',status:'Open',description:'Phishing attacks targeting employees.',treatment:'Mitigate',assetIds:['AST-001']},
    {id:'RSK-002',name:'Vendor SLA non-compliance',category:'Operational',likelihood:3,impact:4,owner:'Sara Mohammed',status:'In Progress',description:'Key vendors failing to meet SLAs.',treatment:'Transfer',assetIds:['AST-003']},
    {id:'RSK-003',name:'Regulatory fine - GDPR',category:'Compliance',likelihood:2,impact:5,owner:'Khalid Hassan',status:'Open',description:'GDPR data retention non-compliance.',treatment:'Mitigate',assetIds:['AST-002']},
    {id:'RSK-004',name:'Cloud outage - AWS region',category:'Technology',likelihood:2,impact:4,owner:'Priya Nair',status:'Open',description:'Critical workloads in single AWS region.',treatment:'Mitigate',assetIds:['AST-004']},
    {id:'RSK-005',name:'Key person dependency',category:'Strategic',likelihood:3,impact:3,owner:'Marcus Webb',status:'Open',description:'Core processes depend on 2-3 individuals.',treatment:'Accept',assetIds:['AST-005']},
    {id:'RSK-006',name:'Budget overrun - IT projects',category:'Financial',likelihood:3,impact:3,owner:'Ahmed Al-Rashid',status:'Closed',description:'IT projects historically overspend.',treatment:'Mitigate',assetIds:[]},
    {id:'RSK-007',name:'Ransomware attack',category:'Technology',likelihood:3,impact:5,owner:'Priya Nair',status:'Open',description:'Targeted ransomware on critical systems.',treatment:'Mitigate',assetIds:['AST-001','AST-004']},
    {id:'RSK-008',name:'Supply chain disruption',category:'Operational',likelihood:2,impact:4,owner:'Marcus Webb',status:'In Progress',description:'Single-source supplier risk.',treatment:'Mitigate',assetIds:['AST-007']},
    {id:'RSK-009',name:'Insider threat',category:'Strategic',likelihood:2,impact:4,owner:'Ahmed Al-Rashid',status:'Open',description:'Malicious or accidental data leak.',treatment:'Mitigate',assetIds:['AST-005']},
    {id:'RSK-010',name:'QCSF non-compliance',category:'Compliance',likelihood:3,impact:4,owner:'Nasser Al-Malki',status:'Open',description:'Failure to meet Qatar Cybersecurity Framework.',treatment:'Mitigate',assetIds:['AST-002']}
  ],
  assets: [
    {id:'AST-001',name:'Customer Database',type:'Data',criticality:'Critical',owner:'Priya Nair',location:'AWS RDS',description:'Production customer PII',riskIds:['RSK-001','RSK-007']},
    {id:'AST-002',name:'GDPR Compliance Records',type:'Data',criticality:'High',owner:'Khalid Hassan',location:'SharePoint',description:'Data retention evidence',riskIds:['RSK-003','RSK-010']},
    {id:'AST-003',name:'Vendor Contracts Repository',type:'Data',criticality:'Medium',owner:'Marcus Webb',location:'SharePoint',description:'All active vendor agreements',riskIds:['RSK-002']},
    {id:'AST-004',name:'AWS Production Environment',type:'Cloud Service',criticality:'Critical',owner:'Priya Nair',location:'AWS us-east-1',description:'Hosts customer-facing apps',riskIds:['RSK-004','RSK-007']},
    {id:'AST-005',name:'IT Architecture Team',type:'Personnel',criticality:'High',owner:'Ahmed Al-Rashid',location:'Riyadh HQ',description:'Key system architects',riskIds:['RSK-005','RSK-009']},
    {id:'AST-006',name:'Corporate Laptops',type:'Hardware',criticality:'Medium',owner:'Sara Mohammed',location:'Global',riskIds:['RSK-001']},
    {id:'AST-007',name:'Semiconductor Supplier',type:'Facility',criticality:'High',owner:'Marcus Webb',location:'Taiwan',riskIds:['RSK-008']}
  ],
  controls: [
    {id:'CTL-001',name:'Multi-factor authentication',type:'Preventive',effectiveness:95,owner:'Priya Nair',lastTested:'2026-05-12',mitigates:['RSK-001','RSK-007']},
    {id:'CTL-002',name:'Vendor security assessments',type:'Detective',effectiveness:54,owner:'Marcus Webb',lastTested:'2026-03-02',mitigates:['RSK-002','RSK-008']},
    {id:'CTL-003',name:'Encrypted backups',type:'Corrective',effectiveness:91,owner:'Sara Mohammed',lastTested:'2026-05-28',mitigates:['RSK-004']},
    {id:'CTL-004',name:'Security awareness training',type:'Preventive',effectiveness:72,owner:'Ahmed Al-Rashid',lastTested:'2026-02-10',mitigates:['RSK-001','RSK-009']},
    {id:'CTL-005',name:'Privileged access monitoring',type:'Detective',effectiveness:67,owner:'Khalid Hassan',lastTested:'2026-04-15',mitigates:['RSK-001']},
    {id:'CTL-006',name:'Incident response plan',type:'Corrective',effectiveness:81,owner:'Priya Nair',lastTested:'2026-05-05',mitigates:['RSK-007']}
  ],
  compliance: [
    {framework:'ISO 27001',requirement:'Access Control Policy',status:'Compliant',owner:'Priya Nair',dueDate:'2026-12-31',progress:100},
    {framework:'GDPR',requirement:'Data Retention Schedule',status:'Non-Compliant',owner:'Khalid Hassan',dueDate:'2026-07-15',progress:35},
    {framework:'SOC 2',requirement:'Incident Response Plan',status:'Partial',owner:'Sara Mohammed',dueDate:'2026-09-30',progress:60},
    {framework:'NIST CSF',requirement:'Asset Inventory',status:'Partial',owner:'Ahmed Al-Rashid',dueDate:'2026-08-01',progress:75},
    {framework:'QCSF 2022',requirement:'Governance & Oversight (Domain 1)',status:'Partial',owner:'Nasser Al-Malki',dueDate:'2026-11-30',progress:45},
    {framework:'QCSF 2022',requirement:'Asset Management & Classification (Domain 3)',status:'In Progress',owner:'Fatima Al-Sulaiti',dueDate:'2026-12-15',progress:60},
    {framework:'QCSF 2022',requirement:'Incident Response & Continuity (Domain 6)',status:'Non-Compliant',owner:'Khalid Hassan',dueDate:'2026-08-30',progress:20},
    {framework:'PCI DSS',requirement:'Secure cardholder data',status:'Compliant',owner:'Priya Nair',dueDate:'2026-10-01',progress:100}
  ],
  issues: [
    {id:'ISS-001',issue:'Phishing simulation failure >30%',linkedRisk:'RSK-001',priority:'High',owner:'Ahmed Al-Rashid',dueDate:'2026-07-01',status:'Open'},
    {id:'ISS-002',issue:'Vendor contract review overdue',linkedRisk:'RSK-002',priority:'Medium',owner:'Marcus Webb',dueDate:'2026-06-30',status:'In Progress'},
    {id:'ISS-003',issue:'GDPR consent forms not updated',linkedRisk:'RSK-003',priority:'Critical',owner:'Khalid Hassan',dueDate:'2026-06-15',status:'Open'},
    {id:'ISS-004',issue:'DR failover test not completed',linkedRisk:'RSK-004',priority:'High',owner:'Priya Nair',dueDate:'2026-07-31',status:'Open'},
    {id:'ISS-005',issue:'No MFA on legacy apps',linkedRisk:'RSK-007',priority:'Critical',owner:'Priya Nair',dueDate:'2026-08-15',status:'Open'}
  ],
  policies: [
    {id:'POL-001',title:'Information Security Policy',category:'Information Security',status:'Active',owner:'Priya Nair',version:'2.1',reviewDate:'2026-12-31',framework:'ISO 27001',description:'Defines approach to protecting information assets.'},
    {id:'POL-002',title:'Data Privacy & GDPR Policy',category:'Data Privacy',status:'Under Review',owner:'Khalid Hassan',version:'1.3',reviewDate:'2026-07-01',framework:'GDPR',description:'Governs personal data processing.'},
    {id:'POL-003',title:'Acceptable Use Policy',category:'IT & Technology',status:'Active',owner:'Ahmed Al-Rashid',version:'3.0',reviewDate:'2026-11-30',framework:'ISO 27001',description:'Rules for acceptable use.'},
    {id:'POL-004',title:'Business Continuity Plan',category:'Operational',status:'Draft',owner:'Sara Mohammed',version:'0.9',reviewDate:'2026-09-15',framework:'ISO 22301',description:'Critical function continuity.'},
    {id:'POL-005',title:'Vendor Management Policy',category:'Operational',status:'Active',owner:'Marcus Webb',version:'1.1',reviewDate:'2026-10-31',framework:'SOC 2',description:'Third-party vendor standards.'},
    {id:'POL-006',title:'QCSF 2022 Compliance Framework Policy',category:'Information Security',status:'Draft',owner:'Nasser Al-Malki',version:'0.5',reviewDate:'2026-09-01',framework:'QCSF 2022',description:'Aligns controls with Qatar Cybersecurity Framework 2022.'}
  ],
  emailConfig:{pubKey:'',serviceId:'',templateId:'',email:''},
  alertPrefs:{critical:true,high:true,overdue:true,policy:true,compliance:false}
};
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); updateBadges(); }
function updateBadges() {
  document.getElementById('asset-badge') && (document.getElementById('asset-badge').textContent = data.assets.length);
  document.getElementById('risk-badge') && (document.getElementById('risk-badge').textContent = data.risks.filter(r=>r.status!=='Closed').length);
}
function severity(score) { if(score>=16) return 'Critical'; if(score>=9) return 'High'; if(score>=4) return 'Medium'; return 'Low'; }
function riskScore(r) { return r.likelihood * r.impact; }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// ======================== PAGE RENDERERS ========================
let currentPage = 'dashboard';
let charts = {};

function renderDashboard() {
  const openRisks = data.risks.filter(r=>r.status!=='Closed').length;
  const criticalRisks = data.risks.filter(r=>severity(riskScore(r))==='Critical').length;
  const avgEff = data.controls.length ? Math.round(data.controls.reduce((a,c)=>a+c.effectiveness,0)/data.controls.length) : 0;
  const compRate = data.compliance.length ? Math.round(data.compliance.filter(c=>c.status==='Compliant').length/data.compliance.length*100) : 0;
  const assetsAtRisk = data.assets.filter(a=>a.riskIds?.length>0).length;
  const topRisks = [...data.risks].sort((a,b)=>riskScore(b)-riskScore(a)).slice(0,5);
  let html = `
    <div class="topbar"><div><div class="topbar-title">Dashboard</div><div class="topbar-sub">Risk & Asset overview</div></div></div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value">${data.risks.length}</div><div class="stat-label">Total Risks</div><div>${openRisks} open</div></div>
        <div class="stat-card"><div class="stat-value">${criticalRisks}</div><div class="stat-label">Critical Risks</div></div>
        <div class="stat-card"><div class="stat-value">${data.assets.length}</div><div class="stat-label">Total Assets</div></div>
        <div class="stat-card"><div class="stat-value">${data.issues.filter(i=>i.status!=='Closed').length}</div><div class="stat-label">Open Issues</div></div>
      </div>
      <div class="kri-grid">
        <div class="kri-card"><div class="kri-value">${avgEff}%</div><div class="stat-label">Control Effectiveness</div><div class="progress-bar"><div class="progress-fill" style="width:${avgEff}%;background:#10b981"></div></div></div>
        <div class="kri-card"><div class="kri-value">${compRate}%</div><div class="stat-label">Compliance Rate</div><div class="progress-bar"><div class="progress-fill" style="width:${compRate}%;background:#f59e0b"></div></div></div>
        <div class="kri-card"><div class="kri-value">${assetsAtRisk}</div><div class="stat-label">Assets at Risk</div></div>
      </div>
      <div class="chart-row">
        <div class="chart-card"><div class="section-title">Risk by Category</div><canvas id="riskCategoryChart"></canvas></div>
        <div class="chart-card"><div class="section-title">Control Effectiveness</div><canvas id="controlChart"></canvas></div>
      </div>
      <div class="chart-row">
        <div class="chart-card"><div class="section-title">Compliance by Framework</div><canvas id="complianceChart"></canvas></div>
        <div class="chart-card"><div class="section-title">Risk Severity</div><canvas id="severityChart"></canvas></div>
      </div>
      <div class="section-card"><div class="section-header"><span class="section-title">Top 5 Risks</span></div>
      <table><thead><tr><th>Risk</th><th>Category</th><th>Score</th><th>Severity</th><th>Owner</th><th>Status</th></tr></thead><tbody>
      ${topRisks.map(r=>`<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.category)}</td><td>${riskScore(r)}</td><td><span class="badge badge-${severity(riskScore(r)).toLowerCase()}">${severity(riskScore(r))}</span></td><td>${escapeHtml(r.owner)}</td><td>${r.status}</td></tr>`).join('')}
      </tbody></table></div>
    </div>
  `;
  document.getElementById('main-content').innerHTML = html;
  setTimeout(() => {
    try {
      if(charts.riskCat) charts.riskCat.destroy();
      const catMap = {}; data.risks.forEach(r=>catMap[r.category]=(catMap[r.category]||0)+1);
      charts.riskCat = new Chart(document.getElementById('riskCategoryChart'), {type:'bar', data:{labels:Object.keys(catMap), datasets:[{label:'Risks', data:Object.values(catMap), backgroundColor:'#7c6af7'}]}, options:{responsive:true}});
      const effCounts = {Effective:0,Partial:0,Ineffective:0}; data.controls.forEach(c=>{if(c.effectiveness>=70) effCounts.Effective++; else if(c.effectiveness>=40) effCounts.Partial++; else effCounts.Ineffective++;});
      charts.control = new Chart(document.getElementById('controlChart'), {type:'doughnut', data:{labels:['Effective','Partial','Ineffective'], datasets:[{data:[effCounts.Effective, effCounts.Partial, effCounts.Ineffective], backgroundColor:['#10b981','#f59e0b','#ef4444']}]}});
      const frameworks = [...new Set(data.compliance.map(c=>c.framework))];
      const compliant = frameworks.map(fw=>data.compliance.filter(c=>c.framework===fw && c.status==='Compliant').length);
      const partial = frameworks.map(fw=>data.compliance.filter(c=>c.framework===fw && c.status==='Partial').length);
      const non = frameworks.map(fw=>data.compliance.filter(c=>c.framework===fw && c.status==='Non-Compliant').length);
      charts.compliance = new Chart(document.getElementById('complianceChart'), {type:'bar', data:{labels:frameworks, datasets:[{label:'Compliant',data:compliant,backgroundColor:'#10b981'},{label:'Partial',data:partial,backgroundColor:'#f59e0b'},{label:'Non-Compliant',data:non,backgroundColor:'#ef4444'}]}, options:{indexAxis:'y', responsive:true}});
      const sevCount = {Critical:0,High:0,Medium:0,Low:0}; data.risks.forEach(r=>sevCount[severity(riskScore(r))]++);
      charts.severity = new Chart(document.getElementById('severityChart'), {type:'pie', data:{labels:['Critical','High','Medium','Low'], datasets:[{data:[sevCount.Critical, sevCount.High, sevCount.Medium, sevCount.Low], backgroundColor:['#ef4444','#f59e0b','#3b82f6','#22c55e']}]}});
    } catch(e) { console.error(e); }
  }, 50);
}

function filterRisks() {
  const search = document.getElementById('riskSearch')?.value.toLowerCase() || '';
  const category = document.getElementById('riskCategoryFilter')?.value || '';
  let filtered = data.risks.filter(r => (!search || r.name.toLowerCase().includes(search) || r.id.toLowerCase().includes(search)) && (!category || r.category === category));
  const tbody = document.getElementById('risksTableBody');
  if(!tbody) return;
  tbody.innerHTML = filtered.map(r => {
    const score = riskScore(r);
    const sev = severity(score);
    const assetNames = (r.assetIds||[]).map(aid => { let a = data.assets.find(ass=>ass.id===aid); return a ? a.name : aid; }).join(', ');
    return `<tr><td><b>${r.id}</b></td><td>${escapeHtml(r.name)}</td><td>${r.category}</td><td>${score}</td><td><span class="badge badge-${sev.toLowerCase()}">${sev}</span></td><td>${r.owner}</td><td><span class="badge badge-${r.status==='Open'?'open':r.status==='In Progress'?'progress':'closed'}">${r.status}</span></td><td>${assetNames || '—'}</td><td class="action-buttons"><button class="btn btn-ghost btn-sm" onclick="editItem('risk','${r.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('risks','${r.id}')">Del</button></td></tr>`;
  }).join('');
}

function renderHeatmap() {
  let html = `<div class="topbar"><div><div class="topbar-title">Risk Heat Map</div><div class="topbar-sub">Likelihood vs Impact</div></div></div><div class="content"><div class="section-card"><div class="heatmap-grid" id="heatmapGrid"></div></div><div id="heatmapDetails"></div></div>`;
  document.getElementById('main-content').innerHTML = html;
  const labels = ['Very Low','Low','Medium','High','Very High'];
  let gridHtml = `<div></div>${labels.map(l=>`<div class="hm-label">${l}</div>`).join('')}`;
  for(let imp=5; imp>=1; imp--) {
    gridHtml += `<div class="hm-label">${labels[imp-1]}</div>`;
    for(let lik=1; lik<=5; lik++) {
      const risks = data.risks.filter(r=>r.likelihood===lik && r.impact===imp);
      const sev = severity(lik*imp);
      const cls = sev==='Critical'?'hm-critical':sev==='High'?'hm-high':sev==='Medium'?'hm-medium':'hm-low';
      gridHtml += `<div class="hm-cell ${cls}" onclick="showHeatmapRisks(${lik},${imp})">${risks.length||''}</div>`;
    }
  }
  document.getElementById('heatmapGrid').innerHTML = gridHtml;
}
function showHeatmapRisks(lik,imp) {
  const risks = data.risks.filter(r=>r.likelihood===lik && r.impact===imp);
  const details = document.getElementById('heatmapDetails');
  if(!risks.length) { details.innerHTML = ''; return; }
  details.innerHTML = `<div class="section-card" style="margin-top:20px"><div class="section-header">Risks at L${lik} x I${imp}</div><table><thead><tr><th>ID</th><th>Risk</th><th>Owner</th><th>Status</th></tr></thead><tbody>${risks.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td>${r.owner}</td><td>${r.status}</td></tr>`).join('')}</tbody></table></div>`;
}

function sv(id,val) { const el=document.getElementById(id); if(el) el.value=val; }
function closeModal() { document.getElementById('modal').style.display = 'none'; editId=null; editIndex=null; }
function saveModal() {
  if(editModalType === 'asset') {
    const name = document.getElementById('fName').value;
    if(!name) { alert('Asset name required'); return; }
    const selectedRisks = [...(document.getElementById('fRisks')?.selectedOptions||[])].map(opt=>opt.value);
    const obj = { id: editId || `AST-${String(data.assets.length+1).padStart(3,'0')}`, name, type: document.getElementById('fType').value, criticality: document.getElementById('fCrit').value, owner: document.getElementById('fOwner').value || 'Unassigned', location: document.getElementById('fLoc').value, description: document.getElementById('fDesc').value, riskIds: selectedRisks };
    if(editId) { const idx=data.assets.findIndex(a=>a.id===editId); data.assets[idx]=obj; } else data.assets.push(obj);
    // sync risk assetIds
    data.risks.forEach(risk => { if(risk.assetIds) risk.assetIds = risk.assetIds.filter(id => data.assets.some(a=>a.id===id)); });
    obj.riskIds.forEach(rid => { const r=data.risks.find(rr=>rr.id===rid); if(r && !r.assetIds?.includes(obj.id)) { if(!r.assetIds) r.assetIds=[]; r.assetIds.push(obj.id); } });
    save(); renderAssets(); toast('Asset saved');
  } else if(editModalType === 'risk') {
    const name = document.getElementById('fName').value;
    if(!name) { alert('Risk name required'); return; }
    const selectedAssets = [...(document.getElementById('fAssets')?.selectedOptions||[])].map(opt=>opt.value);
    const obj = { id: editId || `RSK-${String(data.risks.length+1).padStart(3,'0')}`, name, category: document.getElementById('fCat').value, description: document.getElementById('fDesc').value, likelihood: parseInt(document.getElementById('fLik').value), impact: parseInt(document.getElementById('fImp').value), owner: document.getElementById('fOwner').value, status: document.getElementById('fStatus').value, treatment: document.getElementById('fTreat').value, assetIds: selectedAssets };
    if(editId) { const idx=data.risks.findIndex(r=>r.id===editId); data.risks[idx]=obj; } else data.risks.push(obj);
    data.assets.forEach(asset => { if(asset.riskIds) asset.riskIds = asset.riskIds.filter(id => data.risks.some(r=>r.id===id)); });
    obj.assetIds.forEach(aid => { const a=data.assets.find(ass=>ass.id===aid); if(a && !a.riskIds?.includes(obj.id)) { if(!a.riskIds) a.riskIds=[]; a.riskIds.push(obj.id); } });
    save(); renderRisks(); toast('Risk saved');
  } else if(editModalType === 'control') {
    const obj = { id: editId || `CTL-${String(data.controls.length+1).padStart(3,'0')}`, name: document.getElementById('fName').value, type: document.getElementById('fType').value, effectiveness: parseInt(document.getElementById('fEff').value), owner: document.getElementById('fOwner').value, lastTested: document.getElementById('fTested').value, mitigates: document.getElementById('fMit').value.split(',').map(s=>s.trim()).filter(Boolean) };
    if(editId) { const idx=data.controls.findIndex(c=>c.id===editId); data.controls[idx]=obj; } else data.controls.push(obj);
    save(); renderControls(); toast('Control saved');
  } else if(editModalType === 'policy') {
    const obj = { id: editId || `POL-${String(data.policies.length+1).padStart(3,'0')}`, title: document.getElementById('fName').value, category: document.getElementById('fCat').value, description: document.getElementById('fDesc').value, owner: document.getElementById('fOwner').value, status: document.getElementById('fStatus').value, version: document.getElementById('fVer').value, reviewDate: document.getElementById('fReview').value, framework: document.getElementById('fFw').value };
    if(editId) { const idx=data.policies.findIndex(p=>p.id===editId); data.policies[idx]=obj; } else data.policies.push(obj);
    save(); renderPolicies(); toast('Policy saved');
  } else if(editModalType === 'compliance') {
    const obj = { framework: document.getElementById('fFw').value, requirement: document.getElementById('fReq').value, status: document.getElementById('fStatus').value, owner: document.getElementById('fOwner').value, dueDate: document.getElementById('fDue').value, progress: parseInt(document.getElementById('fProg').value) };
    if(editIndex !== null) data.compliance[editIndex] = obj; else data.compliance.push(obj);
    save(); renderCompliance(); toast('Compliance saved');
  } else if(editModalType === 'issue') {
    const obj = { id: editId || `ISS-${String(data.issues.length+1).padStart(3,'0')}`, issue: document.getElementById('fIssue').value, linkedRisk: document.getElementById('fRisk').value, priority: document.getElementById('fPri').value, owner: document.getElementById('fOwner').value, dueDate: document.getElementById('fDue').value, status: document.getElementById('fStatus').value };
    if(editId) { const idx=data.issues.findIndex(i=>i.id===editId); data.issues[idx]=obj; } else data.issues.push(obj);
    save(); renderIssues(); toast('Issue saved');
  }
  closeModal();
}
function editItem(type, id) {
  if(type==='asset') openModal('asset', data.assets.find(a=>a.id===id));
  else if(type==='risk') openModal('risk', data.risks.find(r=>r.id===id));
  else if(type==='control') openModal('control', data.controls.find(c=>c.id===id));
  else if(type==='policy') openModal('policy', data.policies.find(p=>p.id===id));
  else if(type==='issue') openModal('issue', data.issues.find(i=>i.id===id));
}
function deleteItem(collection, id) {
  if(!confirm('Delete permanently?')) return;
  if(collection === 'assets') {
    const asset = data.assets.find(a=>a.id===id);
    if(asset && asset.riskIds) asset.riskIds.forEach(rid => { const risk=data.risks.find(r=>r.id===rid); if(risk && risk.assetIds) risk.assetIds = risk.assetIds.filter(aid=>aid!==id); });
    data.assets = data.assets.filter(a=>a.id!==id);
    save(); renderAssets(); if(currentPage==='risks') renderRisks();
  } else if(collection === 'risks') {
    const risk = data.risks.find(r=>r.id===id);
    if(risk && risk.assetIds) risk.assetIds.forEach(aid => { const asset=data.assets.find(a=>a.id===aid); if(asset && asset.riskIds) asset.riskIds = asset.riskIds.filter(rid=>rid!==id); });
    data.risks = data.risks.filter(r=>r.id!==id);
    save(); renderRisks(); if(currentPage==='assets') renderAssets();
  } else if(collection === 'controls') { data.controls = data.controls.filter(c=>c.id!==id); save(); renderControls(); }
  else if(collection === 'policies') { data.policies = data.policies.filter(p=>p.id!==id); save(); renderPolicies(); }
  else if(collection === 'issues') { data.issues = data.issues.filter(i=>i.id!==id); save(); renderIssues(); }
  toast('Deleted');
}

function generateReport() {
  const type = document.getElementById('reportType').value;
  const format = document.getElementById('reportFormat').value;
  let rows = [], filename = '';
  if(type === 'risk') {
    rows = [['ID','Risk','Category','Likelihood','Impact','Score','Severity','Owner','Status','Treatment']];
    data.risks.forEach(r => rows.push([r.id, r.name, r.category, r.likelihood, r.impact, riskScore(r), severity(riskScore(r)), r.owner, r.status, r.treatment]));
    filename = 'risk_register.csv';
  } else if(type === 'asset') {
    rows = [['ID','Asset','Type','Criticality','Owner','Location','Linked Risks']];
    data.assets.forEach(a => rows.push([a.id, a.name, a.type, a.criticality, a.owner, a.location||'', (a.riskIds||[]).join(';')]));
    filename = 'asset_inventory.csv';
  } else if(type === 'compliance') {
    rows = [['Framework','Requirement','Status','Owner','Due Date','Progress']];
    data.compliance.forEach(c => rows.push([c.framework, c.requirement, c.status, c.owner, c.dueDate, c.progress]));
    filename = 'compliance.csv';
  } else if(type === 'control') {
    rows = [['ID','Control','Type','Effectiveness','Owner','Last Tested','Mitigates']];
    data.controls.forEach(c => rows.push([c.id, c.name, c.type, c.effectiveness, c.owner, c.lastTested, c.mitigates.join(';')]));
    filename = 'controls.csv';
  } else if(type === 'issue') {
    rows = [['ID','Issue','Linked Risk','Priority','Owner','Due Date','Status']];
    data.issues.forEach(i => rows.push([i.id, i.issue, i.linkedRisk, i.priority, i.owner, i.dueDate, i.status]));
    filename = 'issues.csv';
  }
  if(format === 'csv') {
    const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
    toast('Report exported');
  } else {
    let html = `<html><head><title>GRC Report</title><style>body{font-family:sans-serif;margin:2rem}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px;text-align:left}</style></head><body><h1>${filename.replace('.csv','')}</h1><p>Generated: ${new Date().toLocaleString()}</p><table><thead><tr>${rows[0].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></body></html>`;
    const win = window.open(); win.document.write(html); win.document.close(); win.print();
  }
}
function exportCSV() { generateReport(); }

// Navigation
document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.getAttribute('data-page');
    currentPage = page;
    if(page === 'dashboard') renderDashboard();
    else if(page === 'assets') renderAssets();
    else if(page === 'risks') renderRisks();
    else if(page === 'heatmap') renderHeatmap();
    else if(page === 'controls') renderControls();
    else if(page === 'policies') renderPolicies();
    else if(page === 'compliance') renderCompliance();
    else if(page === 'issues') renderIssues();
    else if(page === 'reports') renderReports();
    else if(page === 'email') renderEmail();
  });
});

// Initial load
renderDashboard();
save();
</script>
