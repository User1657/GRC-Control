<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise GRC Platform — 15+ Modules</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c12;--bg2:#11161f;--bg3:#1a202c;--border:#2d3748;--text:#e2e8f0;--text2:#94a3b8;--purple:#7c6af7;--teal:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6}
body{font-family:'Segoe UI',system-ui;background:var(--bg);color:var(--text);display:flex}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);min-height:100vh;position:fixed;overflow-y:auto}
.logo{padding:20px;font-size:20px;font-weight:700;border-bottom:1px solid var(--border)}
.nav{padding:12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;width:100%;text-align:left;background:none;border:none;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--purple);color:#fff}
.main{margin-left:260px;flex:1}
.topbar{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.topbar-title{font-size:20px;font-weight:700}
.content{padding:24px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-value{font-size:28px;font-weight:700}
.btn{background:var(--purple);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-critical{background:#ef444420;color:#ef4444}
.badge-high{background:#f59e0b20;color:#f59e0b}
.badge-medium{background:#3b82f620;color:#60a5fa}
.modal-overlay{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg2);border-radius:16px;width:500px;max-width:90%;padding:20px}
.form-group{margin-bottom:16px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);padding:8px;border-radius:8px;color:var(--text)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);padding:12px 20px;border-radius:8px;z-index:1100}
.hidden{display:none}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🎯 GRC Enterprise</div>
  <div class="nav" id="nav">
    <!-- 15+ modules as nav items -->
    <button class="nav-item active" data-page="dashboard">📊 Executive Dashboard</button>
    <button class="nav-item" data-page="riskRegister">📋 Risk Register</button>
    <button class="nav-item" data-page="riskAssessment">📝 Risk Assessment</button>
    <button class="nav-item" data-page="riskAppetite">⚖️ Risk Appetite</button>
    <button class="nav-item" data-page="residualRisk">🔄 Residual Risk</button>
    <button class="nav-item" data-page="assetInventory">🏷️ Asset Inventory</button>
    <button class="nav-item" data-page="businessProcess">🔁 Business Processes</button>
    <button class="nav-item" data-page="orgStructure">🏢 Org Structure</button>
    <button class="nav-item" data-page="controlLibrary">🔒 Control Library</button>
    <button class="nav-item" data-page="controlTesting">🧪 Control Testing</button>
    <button class="nav-item" data-page="actionPlans">✅ Action Plans</button>
    <button class="nav-item" data-page="issueManagement">❗ Issues</button>
    <button class="nav-item" data-page="incidentRegister">🚨 Incidents</button>
    <button class="nav-item" data-page="vendorRisk">🏭 Vendor Risk</button>
    <button class="nav-item" data-page="complianceRegister">📜 Compliance</button>
    <button class="nav-item" data-page="auditFindings">🔍 Audit Findings</button>
    <button class="nav-item" data-page="evidenceRepo">📎 Evidence</button>
    <button class="nav-item" data-page="kriManagement">📈 KRIs</button>
    <button class="nav-item" data-page="workflow">🔄 Workflow Approvals</button>
    <button class="nav-item" data-page="auditTrail">📜 Audit Trail</button>
    <button class="nav-item" data-page="reports">📑 Reports</button>
  </div>
</div>
<div class="main" id="main"></div>
<div id="modal" class="modal-overlay hidden"><div class="modal"><div id="modalContent"></div><div style="display:flex; justify-content:flex-end; gap:8px; margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveModal()">Save</button></div></div></div>
<div id="toast" class="toast hidden"></div>

<script>
// ======================== DATA MODEL (full enterprise) ========================
const STORE_KEY = 'grc_enterprise_v1';
let data = JSON.parse(localStorage.getItem(STORE_KEY)) || {
  risks: [], // will populate with demo
  riskAssessments: [], // assessments (inherent + residual per risk)
  riskAppetite: { Cyber: "Medium", Compliance: "Low", Financial: "Medium", Operational: "High", Strategic: "Medium" },
  assets: [],
  businessProcesses: [],
  orgUnits: [{id:"BU1", name:"Finance", type:"Business Unit"},{id:"BU2", name:"IT", type:"Business Unit"},{id:"BU3", name:"Operations", type:"Business Unit"}],
  controls: [],
  controlTests: [], // test results per control
  actionPlans: [],
  issues: [],
  incidents: [],
  vendors: [],
  compliance: [], // compliance requirements
  auditFindings: [],
  evidence: [],
  kris: [{name:"Failed Logins", current:320, threshold:500, unit:"count"},{name:"Open Vulnerabilities", current:45, threshold:100},{name:"Vendor Incidents", current:1, threshold:2}],
  workflows: [], // approvals
  auditLog: [],
  userRole: "admin" // simple RBAC
};

// Demo data initialization
if(data.risks.length === 0) {
  data.risks = [
    {id:"RSK-001", name:"Data Breach", category:"Cybersecurity", owner:"Ahmed", businessUnit:"IT", source:"Internal", dateIdentified:"2025-01-10", status:"Open", likelihood:4, impact:5, inherentScore:20, residualScore:8, controls:["CTL-001"]},
    {id:"RSK-002", name:"Supply Chain Disruption", category:"Operational", owner:"Sara", businessUnit:"Operations", source:"External", dateIdentified:"2025-02-01", status:"In Progress", likelihood:3, impact:4, inherentScore:12, residualScore:6, controls:["CTL-002"]},
    {id:"RSK-003", name:"GDPR Fine", category:"Compliance", owner:"Khalid", businessUnit:"Legal", source:"Regulatory", dateIdentified:"2025-01-20", status:"Open", likelihood:2, impact:5, inherentScore:10, residualScore:4, controls:[]}
  ];
  data.assets = [{id:"AST-001", name:"Customer Database", type:"Database", criticality:"Critical", owner:"IT", location:"AWS", riskIds:["RSK-001"]}];
  data.businessProcesses = [{id:"PROC-001", name:"Payroll", owner:"Finance", assets:["AST-001"], risks:["RSK-003"]}];
  data.controls = [{id:"CTL-001", name:"MFA", type:"Preventive", owner:"IT", frequency:"Continuous", effectiveness:90, lastTested:"2025-03-01"}];
  data.controlTests = [{id:"TEST-001", controlId:"CTL-001", testDate:"2025-03-01", result:"Pass", evidence:"screenshot.png"}];
  data.actionPlans = [{id:"ACT-001", title:"Implement MFA for all apps", owner:"Ahmed", dueDate:"2025-06-01", status:"In Progress", progress:60, riskId:"RSK-001"}];
  data.issues = [{id:"ISS-001", title:"Phishing click rate high", source:"Incident", riskId:"RSK-001", priority:"High", owner:"IT", dueDate:"2025-05-01", status:"Open"}];
  data.incidents = [{id:"INC-001", title:"Phishing email sent", type:"Security", date:"2025-02-10", status:"Investigating", riskId:"RSK-001"}];
  data.vendors = [{id:"VEN-001", name:"Cloud Provider", service:"IaaS", criticality:"High", contractExpiry:"2026-12-31", lastAssessment:"2025-01-15", score:85}];
  data.compliance = [{framework:"ISO 27001", requirement:"Access Control", status:"Partial", owner:"IT", dueDate:"2025-12-31", progress:60, mappedControls:["CTL-001"]}];
  data.auditFindings = [{id:"AUD-001", title:"Weak password policy", severity:"High", auditType:"Internal", owner:"IT", status:"Open", dueDate:"2025-04-30"}];
  data.evidence = [{id:"EVD-001", name:"MFA config screenshot", type:"Screenshot", linkedTo:"CTL-001", uploadDate:"2025-03-01"}];
  save();
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); addAuditLog("Data saved"); }
function addAuditLog(action) { data.auditLog.unshift({timestamp:new Date().toISOString(), user:data.userRole, action}); if(data.auditLog.length>100) data.auditLog.pop(); save(); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); }

// ======================== RENDER MODULES ========================
let currentPage = "dashboard";
let charts = {};

function renderDashboard() {
  let html = `<div class="topbar"><div class="topbar-title">Executive Dashboard</div></div><div class="content">`;
  const totalRisks = data.risks.length;
  const criticalRisks = data.risks.filter(r=>r.inherentScore>=16).length;
  const openIssues = data.issues.filter(i=>i.status!=="Closed").length;
  const complianceScore = data.compliance.length ? Math.round(data.compliance.reduce((a,c)=>a+c.progress,0)/data.compliance.length) : 0;
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-value">${totalRisks}</div><div>Total Risks</div></div>
    <div class="stat-card"><div class="stat-value">${criticalRisks}</div><div>Critical Risks</div></div>
    <div class="stat-card"><div class="stat-value">${openIssues}</div><div>Open Issues</div></div>
    <div class="stat-card"><div class="stat-value">${complianceScore}%</div><div>Compliance Score</div></div>
  </div>`;
  html += `<div class="chart-row"><div class="stat-card"><canvas id="riskByCategoryChart" style="height:200px"></canvas></div><div class="stat-card"><canvas id="riskTrendChart" style="height:200px"></canvas></div></div>`;
  html += `<div class="stat-card"><div class="stat-value">Risks Above Appetite: ${data.risks.filter(r=>r.inherentScore > (data.riskAppetite[r.category] === "Low"?5:data.riskAppetite[r.category]==="Medium"?10:15)).length}</div></div>`;
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
  setTimeout(() => {
    const catMap = {}; data.risks.forEach(r=>catMap[r.category]=(catMap[r.category]||0)+1);
    new Chart(document.getElementById('riskByCategoryChart'), {type:'bar', data:{labels:Object.keys(catMap), datasets:[{label:'Risks', data:Object.values(catMap), backgroundColor:'#7c6af7'}]}});
    // dummy trend
    new Chart(document.getElementById('riskTrendChart'), {type:'line', data:{labels:['Jan','Feb','Mar'], datasets:[{label:'New Risks', data:[3,5,2], borderColor:'#f59e0b'}]}});
  }, 100);
}

// Risk Register (enhanced with inherent/residual)
function renderRiskRegister() {
  let html = `<div class="topbar"><div class="topbar-title">Risk Register</div><button class="btn" onclick="openModal('risk')">+ New Risk</button></div><div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Inherent Score</th><th>Residual Score</th><th>Status</th><th>Owner</th><th>Actions</th></tr></thead><tbody>`;
  data.risks.forEach(r => {
    html += `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.category}</td><td>${r.inherentScore}</td><td>${r.residualScore}</td><td><span class="badge badge-${r.status==='Open'?'critical':'medium'}">${r.status}</span></td><td>${r.owner}</td><td><button class="btn-outline" onclick="openModal('risk','${r.id}')">Edit</button> <button class="btn-outline" onclick="deleteRisk('${r.id}')">Del</button></td></tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Risk Assessment (inherent + residual scoring)
function renderRiskAssessment() {
  let html = `<div class="topbar"><div class="topbar-title">Risk Assessments</div></div><div class="content"><table><thead><tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Inherent Score</th><th>Controls Applied</th><th>Residual Score</th><th>Action</th></tr></thead><tbody>`;
  data.risks.forEach(r => {
    html += `<tr><td>${r.name}</td><td>${r.likelihood}</td><td>${r.impact}</td><td>${r.inherentScore}</td><td>${r.controls?.join(',')||'None'}</td><td><input type="number" id="residual-${r.id}" value="${r.residualScore}" style="width:70px"></td><td><button class="btn" onclick="updateResidual('${r.id}')">Save</button></td></tr>`;
  });
  html += `</tbody></table><div class="stat-card"><h3>Assessment Campaigns</h3><button class="btn" onclick="toast('Campaign feature coming')">Launch Campaign</button></div></div>`;
  document.getElementById('main').innerHTML = html;
}
function updateResidual(riskId) {
  const newResidual = parseInt(document.getElementById(`residual-${riskId}`).value);
  const risk = data.risks.find(r=>r.id===riskId);
  if(risk) { risk.residualScore = newResidual; save(); toast('Residual risk updated'); renderRiskAssessment(); }
}

// Risk Appetite
function renderRiskAppetite() {
  let html = `<div class="topbar"><div class="topbar-title">Risk Appetite Configuration</div></div><div class="content"><table><thead><tr><th>Category</th><th>Appetite Level</th><th>Actions</th></tr></thead><tbody>`;
  for(let cat in data.riskAppetite) {
    html += `<tr><td>${cat}</td><td><select id="app-${cat}"><option ${data.riskAppetite[cat]==='Low'?'selected':''}>Low</option><option ${data.riskAppetite[cat]==='Medium'?'selected':''}>Medium</option><option ${data.riskAppetite[cat]==='High'?'selected':''}>High</option></select></td><td><button class="btn" onclick="saveAppetite('${cat}')">Save</button></td></tr>`;
  }
  html += `</tbody></table><div class="stat-card"><h3>Risks Above Appetite</h3><ul>${data.risks.filter(r=>r.inherentScore > (data.riskAppetite[r.category]==="Low"?5:data.riskAppetite[r.category]==="Medium"?10:15)).map(r=>`<li>${r.name} (Score ${r.inherentScore})</li>`).join('')}</ul></div></div>`;
  document.getElementById('main').innerHTML = html;
}
function saveAppetite(cat) { data.riskAppetite[cat] = document.getElementById(`app-${cat}`).value; save(); toast('Appetite saved'); }

// Asset Inventory (already existed)
function renderAssetInventory() { /* similar to previous but using data.assets */ let html=`<div class="topbar"><div class="topbar-title">Assets</div><button class="btn" onclick="openModal('asset')">+ Add</button></div><div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Criticality</th><th>Owner</th><th>Linked Risks</th></tr></thead><tbody>${data.assets.map(a=>`<tr><td>${a.id}</td><td>${a.name}</td><td>${a.type}</td><td>${a.criticality}</td><td>${a.owner}</td><td>${a.riskIds?.join(',')||''}</td></tr>`).join('')}</tbody></table></div>`; document.getElementById('main').innerHTML=html; }

// Business Processes
function renderBusinessProcess() {
  let html = `<div class="topbar"><div class="topbar-title">Business Processes</div><button class="btn" onclick="openModal('process')">+ Add Process</button></div><div class="content"><table><thead><tr><th>ID</th><th>Process Name</th><th>Owner</th><th>Linked Assets</th><th>Linked Risks</th></tr></thead><tbody>${data.businessProcesses.map(p=>`<tr><td>${p.id}</td><td>${p.name}</td><td>${p.owner}</td><td>${p.assets?.join(',')||''}</td><td>${p.risks?.join(',')||''}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Org Structure
function renderOrgStructure() {
  let html = `<div class="topbar"><div class="topbar-title">Organizational Structure</div><button class="btn" onclick="openModal('orgUnit')">+ Add Unit</button></div><div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th></tr></thead><tbody>${data.orgUnits.map(u=>`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.type}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Control Library
function renderControlLibrary() {
  let html = `<div class="topbar"><div class="topbar-title">Control Library</div><button class="btn" onclick="openModal('control')">+ Add Control</button></div><div class="content"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Effectiveness</th><th>Owner</th><th>Last Tested</th></tr></thead><tbody>${data.controls.map(c=>`<tr><td>${c.id}</td><td>${c.name}</td><td>${c.type}</td><td>${c.effectiveness}%</td><td>${c.owner}</td><td>${c.lastTested}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Control Testing
function renderControlTesting() {
  let html = `<div class="topbar"><div class="topbar-title">Control Testing</div><button class="btn" onclick="openModal('test')">+ New Test</button></div><div class="content"><table><thead><tr><th>Control</th><th>Test Date</th><th>Result</th><th>Evidence</th></tr></thead><tbody>${data.controlTests.map(t=>`<tr><td>${t.controlId}</td><td>${t.testDate}</td><td><span class="badge ${t.result==='Pass'?'badge-critical':''}">${t.result}</span></td><td>${t.evidence}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Action Plans
function renderActionPlans() {
  let html = `<div class="topbar"><div class="topbar-title">Action Plans</div><button class="btn" onclick="openModal('action')">+ Add Action</button></div><div class="content"><table><thead><tr><th>Action</th><th>Owner</th><th>Due Date</th><th>Progress</th><th>Status</th></tr></thead><tbody>${data.actionPlans.map(a=>`<tr><td>${a.title}</td><td>${a.owner}</td><td>${a.dueDate}</td><td>${a.progress}%</td><td>${a.status}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Issues
function renderIssues() {
  let html = `<div class="topbar"><div class="topbar-title">Issues Management</div><button class="btn" onclick="openModal('issue')">+ Add Issue</button></div><div class="content"><table><thead><tr><th>Title</th><th>Source</th><th>Priority</th><th>Owner</th><th>Due Date</th><th>Status</th></tr></thead><tbody>${data.issues.map(i=>`<tr><td>${i.title}</td><td>${i.source}</td><td>${i.priority}</td><td>${i.owner}</td><td>${i.dueDate}</td><td>${i.status}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Incident Register
function renderIncidents() {
  let html = `<div class="topbar"><div class="topbar-title">Incident Register</div><button class="btn" onclick="openModal('incident')">+ Log Incident</button></div><div class="content"><table><thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Date</th><th>Status</th><th>Linked Risk</th></tr></thead><tbody>${data.incidents.map(i=>`<tr><td>${i.id}</td><td>${i.title}</td><td>${i.type}</td><td>${i.date}</td><td>${i.status}</td><td>${i.riskId}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Vendor Risk
function renderVendorRisk() {
  let html = `<div class="topbar"><div class="topbar-title">Vendor Risk Management</div><button class="btn" onclick="openModal('vendor')">+ Add Vendor</button></div><div class="content"><table><thead><tr><th>Vendor</th><th>Service</th><th>Criticality</th><th>Contract Expiry</th><th>Assessment Score</th></tr></thead><tbody>${data.vendors.map(v=>`<tr><td>${v.name}</td><td>${v.service}</td><td>${v.criticality}</td><td>${v.contractExpiry}</td><td>${v.score}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Compliance Register (with QCSF)
function renderCompliance() {
  let html = `<div class="topbar"><div class="topbar-title">Compliance Register</div><button class="btn" onclick="openModal('compliance')">+ Add Requirement</button></div><div class="content"><table><thead><tr><th>Framework</th><th>Requirement</th><th>Status</th><th>Progress</th><th>Owner</th></tr></thead><tbody>${data.compliance.map(c=>`<tr><td>${c.framework}</td><td>${c.requirement}</td><td><span class="badge">${c.status}</span></td><td>${c.progress}%</td><td>${c.owner}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Audit Findings
function renderAuditFindings() {
  let html = `<div class="topbar"><div class="topbar-title">Audit Findings</div><button class="btn" onclick="openModal('audit')">+ Add Finding</button></div><div class="content"><table><thead><tr><th>Finding</th><th>Severity</th><th>Audit Type</th><th>Status</th><th>Due Date</th></tr></thead><tbody>${data.auditFindings.map(f=>`<tr><td>${f.title}</td><td>${f.severity}</td><td>${f.auditType}</td><td>${f.status}</td><td>${f.dueDate}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Evidence Repository
function renderEvidence() {
  let html = `<div class="topbar"><div class="topbar-title">Evidence Repository</div><button class="btn" onclick="openModal('evidence')">+ Upload Evidence</button></div><div class="content"><table><thead><tr><th>Name</th><th>Type</th><th>Linked To</th><th>Upload Date</th></tr></thead><tbody>${data.evidence.map(e=>`<tr><td>${e.name}</td><td>${e.type}</td><td>${e.linkedTo}</td><td>${e.uploadDate}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// KRI Management
function renderKRI() {
  let html = `<div class="topbar"><div class="topbar-title">Key Risk Indicators (KRIs)</div><button class="btn" onclick="openModal('kri')">+ Add KRI</button></div><div class="content"><table><thead><tr><th>KRI</th><th>Current Value</th><th>Threshold</th><th>Status</th></tr></thead><tbody>${data.kris.map(k=>`<tr><td>${k.name}</td><td>${k.current}</td><td>${k.threshold}</td><td><span class="badge ${k.current>k.threshold?'badge-critical':'badge-medium'}">${k.current>k.threshold?'Exceeded':'OK'}</span></td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Workflow Approvals
function renderWorkflow() {
  let html = `<div class="topbar"><div class="topbar-title">Workflow Approvals</div><div class="content"><div class="stat-card"><h3>Pending Approvals</h3><ul>${data.workflows.filter(w=>w.status==='pending').map(w=>`<li>${w.itemType}: ${w.itemName} - Requestor: ${w.requestor} <button class="btn" onclick="approveWorkflow('${w.id}')">Approve</button></li>`).join('')}</ul><button class="btn" onclick="toast('New approval request feature')">Request Approval</button></div></div>`;
  document.getElementById('main').innerHTML = html;
}
function approveWorkflow(id) { const w = data.workflows.find(w=>w.id===id); if(w) w.status='approved'; save(); renderWorkflow(); toast('Approved'); }

// Audit Trail
function renderAuditTrail() {
  let html = `<div class="topbar"><div class="topbar-title">Audit Trail</div></div><div class="content"><table><thead><tr><th>Timestamp</th><th>User</th><th>Action</th></tr></thead><tbody>${data.auditLog.slice(0,50).map(log=>`<tr><td>${new Date(log.timestamp).toLocaleString()}</td><td>${log.user}</td><td>${log.action}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById('main').innerHTML = html;
}

// Reports (CSV)
function renderReports() {
  let html = `<div class="topbar"><div class="topbar-title">Reports</div></div><div class="content"><div class="stat-card"><h3>Generate Report</h3><select id="reportType"><option value="risk">Risk Register</option><option value="asset">Assets</option><option value="compliance">Compliance</option></select><button class="btn" onclick="exportReport()">Export CSV</button></div></div>`;
  document.getElementById('main').innerHTML = html;
}
function exportReport() {
  const type = document.getElementById('reportType').value;
  let rows = [];
  if(type==='risk') rows = [['ID','Name','Category','Inherent','Residual','Status'], ...data.risks.map(r=>[r.id,r.name,r.category,r.inherentScore,r.residualScore,r.status])];
  else if(type==='asset') rows = [['ID','Name','Type','Criticality'], ...data.assets.map(a=>[a.id,a.name,a.type,a.criticality])];
  else rows = [['Framework','Requirement','Status','Progress'], ...data.compliance.map(c=>[c.framework,c.requirement,c.status,c.progress])];
  const csv = rows.map(row=>row.map(cell=>`"${cell}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${type}_report.csv`; a.click(); toast('Report downloaded');
}

// Modal handling for generic add/edit (simplified)
let currentModalType = null, currentEditId = null;
function openModal(type, id) {
  currentModalType = type; currentEditId = id;
  let form = '';
  if(type==='risk') form = `<input id="riskName" placeholder="Risk Name"><select id="riskCat"><option>Cybersecurity</option><option>Operational</option><option>Compliance</option></select><input id="riskLikelihood" placeholder="Likelihood 1-5"><input id="riskImpact" placeholder="Impact 1-5">`;
  else if(type==='asset') form = `<input id="assetName" placeholder="Asset Name"><select id="assetType"><option>Database</option><option>Server</option><option>Application</option></select>`;
  else if(type==='process') form = `<input id="procName" placeholder="Process Name"><input id="procOwner" placeholder="Owner">`;
  else if(type==='orgUnit') form = `<input id="unitName" placeholder="Unit Name"><select id="unitType"><option>Business Unit</option><option>Department</option><option>Location</option></select>`;
  else if(type==='control') form = `<input id="ctrlName" placeholder="Control Name"><select id="ctrlType"><option>Preventive</option><option>Detective</option><option>Corrective</option></select>`;
  else if(type==='test') form = `<select id="testControl"><option>${data.controls.map(c=>`<option>${c.id}</option>`).join('')}</option></select><input type="date" id="testDate"><select id="testResult"><option>Pass</option><option>Fail</option><option>Partial</option></select><input id="testEvidence" placeholder="Evidence reference">`;
  else if(type==='action') form = `<input id="actionTitle" placeholder="Action"><input id="actionOwner" placeholder="Owner"><input type="date" id="actionDue"><input id="actionProgress" placeholder="Progress %">`;
  else if(type==='issue') form = `<input id="issueTitle" placeholder="Issue Title"><select id="issueSource"><option>Audit</option><option>Incident</option><option>Risk Assessment</option></select><select id="issuePriority"><option>High</option><option>Medium</option><option>Low</option></select>`;
  else if(type==='incident') form = `<input id="incTitle" placeholder="Incident Title"><select id="incType"><option>Security</option><option>Operational</option><option>Privacy</option></select><input type="date" id="incDate">`;
  else if(type==='vendor') form = `<input id="venName" placeholder="Vendor Name"><input id="venService" placeholder="Service"><select id="venCriticality"><option>High</option><option>Medium</option><option>Low</option></select>`;
  else if(type==='compliance') form = `<input id="compFramework" placeholder="Framework (e.g., QCSF 2022)"><input id="compReq" placeholder="Requirement"><select id="compStatus"><option>Compliant</option><option>Partial</option><option>Non-Compliant</option></select><input id="compProgress" placeholder="Progress %">`;
  else if(type==='audit') form = `<input id="auditTitle" placeholder="Finding"><select id="auditSeverity"><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select><select id="auditType"><option>Internal</option><option>External</option><option>Regulatory</option></select>`;
  else if(type==='evidence') form = `<input id="evName" placeholder="Evidence name"><select id="evType"><option>Screenshot</option><option>Document</option><option>Log</option></select><input id="evLink" placeholder="Linked To (e.g., control ID)">`;
  else if(type==='kri') form = `<input id="kriName" placeholder="KRI Name"><input id="kriThreshold" placeholder="Threshold"><input id="kriCurrent" placeholder="Current Value">`;
  document.getElementById('modalContent').innerHTML = form;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); currentModalType=null; }
function saveModal() {
  if(currentModalType==='risk') {
    const newRisk = { id:`RSK-${data.risks.length+1}`, name:document.getElementById('riskName').value, category:document.getElementById('riskCat').value, likelihood:parseInt(document.getElementById('riskLikelihood').value), impact:parseInt(document.getElementById('riskImpact').value), inherentScore:parseInt(document.getElementById('riskLikelihood').value)*parseInt(document.getElementById('riskImpact').value), residualScore:0, status:"Open", owner:"TBD" };
    data.risks.push(newRisk);
  } else if(currentModalType==='asset') {
    data.assets.push({ id:`AST-${data.assets.length+1}`, name:document.getElementById('assetName').value, type:document.getElementById('assetType').value, criticality:"Medium", owner:"", riskIds:[] });
  } else if(currentModalType==='process') {
    data.businessProcesses.push({ id:`PROC-${data.businessProcesses.length+1}`, name:document.getElementById('procName').value, owner:document.getElementById('procOwner').value, assets:[], risks:[] });
  } else if(currentModalType==='orgUnit') {
    data.orgUnits.push({ id:`UNIT-${data.orgUnits.length+1}`, name:document.getElementById('unitName').value, type:document.getElementById('unitType').value });
  } else if(currentModalType==='control') {
    data.controls.push({ id:`CTL-${data.controls.length+1}`, name:document.getElementById('ctrlName').value, type:document.getElementById('ctrlType').value, effectiveness:0, owner:"", lastTested:"" });
  } else if(currentModalType==='test') {
    data.controlTests.push({ id:`TEST-${data.controlTests.length+1}`, controlId:document.getElementById('testControl').value, testDate:document.getElementById('testDate').value, result:document.getElementById('testResult').value, evidence:document.getElementById('testEvidence').value });
  } else if(currentModalType==='action') {
    data.actionPlans.push({ id:`ACT-${data.actionPlans.length+1}`, title:document.getElementById('actionTitle').value, owner:document.getElementById('actionOwner').value, dueDate:document.getElementById('actionDue').value, progress:parseInt(document.getElementById('actionProgress').value), status:"In Progress" });
  } else if(currentModalType==='issue') {
    data.issues.push({ id:`ISS-${data.issues.length+1}`, title:document.getElementById('issueTitle').value, source:document.getElementById('issueSource').value, priority:document.getElementById('issuePriority').value, owner:"", dueDate:"", status:"Open" });
  } else if(currentModalType==='incident') {
    data.incidents.push({ id:`INC-${data.incidents.length+1}`, title:document.getElementById('incTitle').value, type:document.getElementById('incType').value, date:document.getElementById('incDate').value, status:"Investigating", riskId:"" });
  } else if(currentModalType==='vendor') {
    data.vendors.push({ id:`VEN-${data.vendors.length+1}`, name:document.getElementById('venName').value, service:document.getElementById('venService').value, criticality:document.getElementById('venCriticality').value, contractExpiry:"", score:0 });
  } else if(currentModalType==='compliance') {
    data.compliance.push({ framework:document.getElementById('compFramework').value, requirement:document.getElementById('compReq').value, status:document.getElementById('compStatus').value, owner:"", dueDate:"", progress:parseInt(document.getElementById('compProgress').value), mappedControls:[] });
  } else if(currentModalType==='audit') {
    data.auditFindings.push({ id:`AUD-${data.auditFindings.length+1}`, title:document.getElementById('auditTitle').value, severity:document.getElementById('auditSeverity').value, auditType:document.getElementById('auditType').value, status:"Open", dueDate:"" });
  } else if(currentModalType==='evidence') {
    data.evidence.push({ id:`EVD-${data.evidence.length+1}`, name:document.getElementById('evName').value, type:document.getElementById('evType').value, linkedTo:document.getElementById('evLink').value, uploadDate:new Date().toISOString().slice(0,10) });
  } else if(currentModalType==='kri') {
    data.kris.push({ name:document.getElementById('kriName').value, threshold:parseInt(document.getElementById('kriThreshold').value), current:parseInt(document.getElementById('kriCurrent').value), unit:"count" });
  }
  save(); closeModal(); toast('Added'); renderCurrentPage();
}
function deleteRisk(id) { if(confirm('Delete risk?')) { data.risks = data.risks.filter(r=>r.id!==id); save(); renderCurrentPage(); } }

function renderCurrentPage() {
  if(currentPage==='dashboard') renderDashboard();
  else if(currentPage==='riskRegister') renderRiskRegister();
  else if(currentPage==='riskAssessment') renderRiskAssessment();
  else if(currentPage==='riskAppetite') renderRiskAppetite();
  else if(currentPage==='residualRisk') renderRiskAssessment(); // same as assessment
  else if(currentPage==='assetInventory') renderAssetInventory();
  else if(currentPage==='businessProcess') renderBusinessProcess();
  else if(currentPage==='orgStructure') renderOrgStructure();
  else if(currentPage==='controlLibrary') renderControlLibrary();
  else if(currentPage==='controlTesting') renderControlTesting();
  else if(currentPage==='actionPlans') renderActionPlans();
  else if(currentPage==='issueManagement') renderIssues();
  else if(currentPage==='incidentRegister') renderIncidents();
  else if(currentPage==='vendorRisk') renderVendorRisk();
  else if(currentPage==='complianceRegister') renderCompliance();
  else if(currentPage==='auditFindings') renderAuditFindings();
  else if(currentPage==='evidenceRepo') renderEvidence();
  else if(currentPage==='kriManagement') renderKRI();
  else if(currentPage==='workflow') renderWorkflow();
  else if(currentPage==='auditTrail') renderAuditTrail();
  else if(currentPage==='reports') renderReports();
}

// Navigation
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    btn.classList.add('active');
    currentPage = btn.getAttribute('data-page');
    renderCurrentPage();
  });
});
renderDashboard();
</script>
