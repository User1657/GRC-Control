<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise GRC Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0a0c12; color: #e2e8f0; display: flex; }
        .sidebar { width: 260px; background: #11161f; border-right: 1px solid #2d3748; min-height: 100vh; position: fixed; overflow-y: auto; }
        .logo { padding: 20px; font-size: 20px; font-weight: bold; color: #7c6af7; }
        .nav { padding: 16px; }
        .nav-item { display: block; width: 100%; padding: 10px; background: none; border: none; color: #94a3b8; text-align: left; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 14px; }
        .nav-item:hover { background: #1a202c; color: white; }
        .nav-item.active { background: #7c6af7; color: white; }
        .main { margin-left: 260px; flex: 1; min-height: 100vh; }
        .topbar { padding: 16px 24px; background: #11161f; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center; }
        .topbar-title { font-size: 20px; font-weight: 600; }
        .content { padding: 24px; }
        .btn { background: #7c6af7; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .btn-outline { background: transparent; border: 1px solid #4a5568; color: #cbd5e1; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #11161f; border: 1px solid #2d3748; border-radius: 12px; padding: 16px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #7c6af7; }
        .table-container { overflow-x: auto; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2d3748; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-critical { background: #ef444420; color: #ef4444; }
        .badge-high { background: #f59e0b20; color: #f59e0b; }
        .badge-medium { background: #3b82f620; color: #60a5fa; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #1a202c; border-radius: 16px; width: 600px; max-width: 90%; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; background: #0f1117; border: 1px solid #2d3748; padding: 8px; border-radius: 6px; color: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 8px; z-index: 1100; }
        #loginOverlay { position: fixed; inset: 0; background: #0a0c12; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: #11161f; border-radius: 16px; padding: 32px; width: 350px; text-align: center; }
        .login-card input { margin: 16px 0; width: 100%; }
        .error-msg { color: #ef4444; margin-top: 8px; }
    </style>
</head>
<body>
<div id="loginOverlay">
    <div class="login-card">
        <h2>🔐 GRC Enterprise</h2>
        <p style="margin:16px 0">Enter password</p>
        <input type="password" id="passwordInput" placeholder="Password" autofocus>
        <button class="btn" id="loginBtn" style="width:100%">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>
<div id="grcApp" style="display:none">
    <div class="sidebar">
        <div class="logo">🎯 GRC Enterprise</div>
        <div class="nav" id="navContainer"></div>
    </div>
    <div class="main" id="mainContent"></div>
</div>
<div id="modal" class="modal-overlay hidden">
    <div class="modal">
        <div id="modalBody"></div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px">
            <button class="btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="saveModal()">Save</button>
        </div>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
// ----------------------------- PASSWORD -----------------------------
const DEFAULT_PASS = "admin123";
function verifyPassword(pwd) { return pwd === DEFAULT_PASS; }
function logout() { sessionStorage.removeItem('grc_logged_in'); document.getElementById('loginOverlay').style.display='flex'; document.getElementById('grcApp').style.display='none'; }
function checkLogin() {
    if(sessionStorage.getItem('grc_logged_in') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('grcApp').style.display = 'block';
        initApp();
    } else {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('grcApp').style.display = 'none';
    }
}
document.getElementById('loginBtn').onclick = function() {
    const pwd = document.getElementById('passwordInput').value;
    if(verifyPassword(pwd)) {
        sessionStorage.setItem('grc_logged_in', 'true');
        checkLogin();
    } else {
        document.getElementById('loginError').innerText = 'Incorrect password';
    }
};
document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ----------------------------- DATA MODEL -----------------------------
const STORE_KEY = 'grc_full_v2';
let data = JSON.parse(localStorage.getItem(STORE_KEY)) || {
    risks: [], controls: [], assets: [], processes: [], orgUnits: [], actionPlans: [],
    issues: [], incidents: [], vendors: [], compliance: [], auditFindings: [], evidence: [],
    kris: [], workflows: [], auditLog: []
};

if(data.risks.length === 0) {
    data.risks = [
        { id:"RSK-001", name:"Data Breach", description:"Unauthorized access to sensitive data", category:"Cyber", subCategory:"Data Security", businessUnit:"IT", department:"Infrastructure", owner:"Ahmed", dateIdentified:"2025-01-15", lastReviewDate:"2025-06-01", likelihood:4, impact:5, inherentScore:20, residualScore:8, trend:"Increasing", riskVelocity:"High", confidenceLevel:"Medium", treatmentStrategy:"Mitigate", treatmentStatus:"In Progress", targetResidualScore:5, targetClosureDate:"2025-09-30", riskAccepted:"No", acceptedBy:"Risk Committee" },
        { id:"RSK-002", name:"Supply Chain Disruption", description:"Key supplier failure", category:"Operational", subCategory:"Logistics", businessUnit:"Operations", department:"Procurement", owner:"Sara", dateIdentified:"2025-02-01", lastReviewDate:"2025-06-15", likelihood:3, impact:4, inherentScore:12, residualScore:6, trend:"Stable", riskVelocity:"Medium", confidenceLevel:"High", treatmentStrategy:"Transfer", treatmentStatus:"Not Started", targetResidualScore:4, targetClosureDate:"2025-08-30", riskAccepted:"No", acceptedBy:"" },
        { id:"RSK-003", name:"GDPR Fine", description:"Non-compliance with data protection", category:"Compliance", subCategory:"Regulatory", businessUnit:"Legal", department:"Compliance", owner:"Khalid", dateIdentified:"2025-01-20", lastReviewDate:"2025-05-20", likelihood:2, impact:5, inherentScore:10, residualScore:4, trend:"Decreasing", riskVelocity:"Low", confidenceLevel:"High", treatmentStrategy:"Mitigate", treatmentStatus:"In Progress", targetResidualScore:3, targetClosureDate:"2025-07-31", riskAccepted:"No", acceptedBy:"" }
    ];
    data.controls = [
        { id:"CTL-001", name:"Multi-Factor Authentication", type:"Preventive", effectiveness:90, owner:"IT", lastTested:"2025-03-01", linkedControls:"MFA, DLP", controlCount:2, controlStatus:"Effective" },
        { id:"CTL-002", name:"Vendor Security Assessment", type:"Detective", effectiveness:70, owner:"Procurement", lastTested:"2025-02-15", linkedControls:"Vendor audits", controlCount:1, controlStatus:"Partially Effective" }
    ];
    data.assets = [{ id:"AST-001", name:"Customer Database", type:"Database", criticality:"Critical", owner:"IT", location:"AWS", riskIds:["RSK-001"] }];
    data.processes = [{ id:"PROC-001", name:"Payroll", owner:"Finance", assets:[], risks:[] }];
    data.orgUnits = [{ id:"BU-1", name:"Finance", type:"Business Unit" }, { id:"BU-2", name:"IT", type:"Business Unit" }];
    data.actionPlans = [{ id:"ACT-001", title:"Implement MFA", owner:"Ahmed", dueDate:"2025-06-01", progress:60, status:"In Progress", riskId:"RSK-001" }];
    data.issues = [{ id:"ISS-001", title:"Phishing high rate", source:"Incident", priority:"High", owner:"IT", dueDate:"2025-05-01", status:"Open", riskId:"RSK-001" }];
    data.incidents = [{ id:"INC-001", title:"Phishing email", type:"Security", date:"2025-02-10", status:"Investigating", riskId:"RSK-001" }];
    data.vendors = [{ id:"VEN-001", name:"Cloud Provider", service:"IaaS", criticality:"High", contractExpiry:"2026-12-31", score:85 }];
    data.compliance = [
        { framework:"ISO 27001", requirement:"Access Control", status:"Partial", owner:"IT", dueDate:"2025-12-31", progress:60, mappedControls:[] },
        { framework:"QCSF 2022", requirement:"Asset Management", status:"In Progress", owner:"CISO", dueDate:"2025-08-01", progress:45, mappedControls:[] }
    ];
    data.auditFindings = [{ id:"AUD-001", title:"Weak password", severity:"High", auditType:"Internal", owner:"IT", status:"Open", dueDate:"2025-04-30" }];
    data.evidence = [{ id:"EVD-001", name:"MFA config", type:"Screenshot", linkedTo:"CTL-001", uploadDate:"2025-03-01" }];
    data.kris = [{ name:"Failed Logins", current:320, threshold:500 }, { name:"Open Vulns", current:45, threshold:100 }];
    data.workflows = [];
    data.auditLog = [];
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
}
function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); addAuditLog("Data saved"); }
function addAuditLog(action) { data.auditLog.unshift({ timestamp: new Date().toISOString(), user: "admin", action }); if(data.auditLog.length>100) data.auditLog.pop(); saveData(); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); }
function getRiskRating(score) { if(score>=16) return "Critical"; if(score>=9) return "High"; if(score>=4) return "Medium"; return "Low"; }
function getRiskRatingClass(score) { return "badge-"+getRiskRating(score).toLowerCase(); }

// ----------------------------- DASHBOARD -----------------------------
function renderDashboard() {
    const total = data.risks.length;
    const critical = data.risks.filter(r=>getRiskRating(r.inherentScore)==='Critical').length;
    const avgResidual = data.risks.reduce((a,r)=>a+r.residualScore,0)/total || 0;
    const html = `
        <div class="topbar"><div class="topbar-title">Executive Dashboard</div></div>
        <div class="content">
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-value">${total}</div><div>Total Risks</div></div>
                <div class="stat-card"><div class="stat-value">${critical}</div><div>Critical Risks</div></div>
                <div class="stat-card"><div class="stat-value">${avgResidual.toFixed(1)}</div><div>Avg Residual Score</div></div>
            </div>
            <div class="stat-card"><h3>Risks Above Appetite (Score >10)</h3><ul>${data.risks.filter(r=>r.inherentScore>10).map(r=>`<li>${r.name} (${r.inherentScore})</li>`).join('')||'<li>None</li>'}</ul></div>
        </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
}

// ----------------------------- RISK REGISTER (full fields) -----------------------------
function renderRiskRegister() {
    let html = `<div class="topbar"><div class="topbar-title">Risk Register</div><button class="btn" onclick="openModal('risk')">+ New Risk</button></div>
    <div class="content"><div class="table-container"><table><thead><tr>
        <th>ID</th><th>Name</th><th>Description</th><th>Category</th><th>Sub Cat</th><th>BU</th><th>Dept</th>
        <th>Owner</th><th>Inherent</th><th>Residual</th><th>Rating</th><th>Status</th><th>Actions</th>
    </tr></thead><tbody>`;
    data.risks.forEach(r => {
        html += `<tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.description||''}</td>
            <td>${r.category}</td>
            <td>${r.subCategory||''}</td>
            <td>${r.businessUnit||''}</td>
            <td>${r.department||''}</td>
            <td>${r.owner}</td>
            <td>${r.inherentScore}</td>
            <td>${r.residualScore}</td>
            <td><span class="badge ${getRiskRatingClass(r.inherentScore)}">${getRiskRating(r.inherentScore)}</span></td>
            <td>${r.treatmentStatus||'Open'}</td>
            <td><button class="btn-outline" onclick="editRisk('${r.id}')">Edit</button> <button class="btn-outline" onclick="deleteRisk('${r.id}')">Del</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}

// ----------------------------- RISK ASSESSMENT & TREATMENT (inline) -----------------------------
function renderRiskAssessment() {
    let html = `<div class="topbar"><div class="topbar-title">Risk Assessment & Treatment</div></div>
    <div class="content"><div class="table-container"><table><thead><tr>
        <th>Risk</th><th>Likelihood</th><th>Impact</th><th>Inherent</th><th>Residual</th><th>Rating</th>
        <th>Trend</th><th>Velocity</th><th>Confidence</th><th>Treatment Strat</th><th>Treatment Status</th>
        <th>Target Residual</th><th>Target Date</th><th>Accepted?</th><th>Action</th>
    </tr></thead><tbody>`;
    data.risks.forEach(r => {
        html += `<tr>
            <td>${r.name}</td>
            <td><input type="number" id="lik-${r.id}" value="${r.likelihood}" min="1" max="5" style="width:70px"></td>
            <td><input type="number" id="imp-${r.id}" value="${r.impact}" min="1" max="5" style="width:70px"></td>
            <td id="inh-${r.id}">${r.inherentScore}</td>
            <td><input type="number" id="res-${r.id}" value="${r.residualScore}" style="width:70px"></td>
            <td><span class="badge ${getRiskRatingClass(r.inherentScore)}">${getRiskRating(r.inherentScore)}</span></td>
            <td><select id="trend-${r.id}">${["Increasing","Stable","Decreasing"].map(o=>`<option ${r.trend===o?'selected':''}>${o}</option>`).join('')}</select></td>
            <td><select id="vel-${r.id}">${["High","Medium","Low"].map(o=>`<option ${r.riskVelocity===o?'selected':''}>${o}</option>`).join('')}</select></td>
            <td><select id="conf-${r.id}">${["High","Medium","Low"].map(o=>`<option ${r.confidenceLevel===o?'selected':''}>${o}</option>`).join('')}</select></td>
            <td><select id="strat-${r.id}">${["Mitigate","Transfer","Accept","Avoid"].map(o=>`<option ${r.treatmentStrategy===o?'selected':''}>${o}</option>`).join('')}</select></td>
            <td><select id="treatStatus-${r.id}">${["Not Started","In Progress","Completed"].map(o=>`<option ${r.treatmentStatus===o?'selected':''}>${o}</option>`).join('')}</select></td>
            <td><input type="number" id="targetRes-${r.id}" value="${r.targetResidualScore||0}" style="width:70px"></td>
            <td><input type="date" id="targetDate-${r.id}" value="${r.targetClosureDate||''}"></td>
            <td><select id="accepted-${r.id}"><option ${r.riskAccepted==='Yes'?'selected':''}>Yes</option><option ${r.riskAccepted==='No'?'selected':''}>No</option></select></td>
            <td><button class="btn" onclick="updateRisk('${r.id}')">Update</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}
window.updateRisk = function(riskId) {
    const r = data.risks.find(r=>r.id===riskId);
    if(r) {
        r.likelihood = parseInt(document.getElementById(`lik-${riskId}`).value);
        r.impact = parseInt(document.getElementById(`imp-${riskId}`).value);
        r.inherentScore = r.likelihood * r.impact;
        r.residualScore = parseInt(document.getElementById(`res-${riskId}`).value);
        r.trend = document.getElementById(`trend-${riskId}`).value;
        r.riskVelocity = document.getElementById(`vel-${riskId}`).value;
        r.confidenceLevel = document.getElementById(`conf-${riskId}`).value;
        r.treatmentStrategy = document.getElementById(`strat-${riskId}`).value;
        r.treatmentStatus = document.getElementById(`treatStatus-${riskId}`).value;
        r.targetResidualScore = parseInt(document.getElementById(`targetRes-${riskId}`).value);
        r.targetClosureDate = document.getElementById(`targetDate-${riskId}`).value;
        r.riskAccepted = document.getElementById(`accepted-${riskId}`).value;
        saveData();
        toast('Risk updated');
        renderRiskAssessment();
    }
};

// ----------------------------- CONTROLS -----------------------------
function renderControls() {
    let html = `<div class="topbar"><div class="topbar-title">Control Library</div><button class="btn" onclick="openModal('control')">+ New Control</button></div>
    <div class="content"><div class="table-container"><table><thead><tr>
        <th>ID</th><th>Name</th><th>Type</th><th>Effectiveness</th><th>Owner</th><th>Last Tested</th>
        <th>Linked Controls</th><th>Control Count</th><th>Status</th><th>Actions</th>
    </table></thead><tbody>`;
    data.controls.forEach(c => {
        html += `<tr>
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.type}</td>
            <td>${c.effectiveness}%</td>
            <td>${c.owner}</td>
            <td>${c.lastTested}</td>
            <td>${c.linkedControls||''}</td>
            <td>${c.controlCount||0}</td>
            <td><span class="badge">${c.controlStatus||''}</span></td>
            <td><button class="btn-outline" onclick="editControl('${c.id}')">Edit</button> <button class="btn-outline" onclick="deleteControl('${c.id}')">Del</button></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
}
window.editControl = function(id) { openModal('control', data.controls.find(c=>c.id===id)); };
window.deleteControl = function(id) { if(confirm('Delete control?')) { data.controls = data.controls.filter(c=>c.id!==id); saveData(); renderControls(); toast('Deleted'); } };

// ----------------------------- OTHER MODULES (stubs) -----------------------------
function renderAssets() { let html = `<div class="topbar"><div class="topbar-title">Asset Inventory</div><button class="btn" onclick="openModal('asset')">+ Add Asset</button></div><div class="content"><div class="table-container"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Criticality</th><th>Owner</th><th>Location</th><th>Risks</th><th>Actions</th></tr></thead><tbody>${data.assets.map(a=>`<tr><td>${a.id}</td><td>${a.name}</td><td>${a.type}</td><td>${a.criticality}</td><td>${a.owner}</td><td>${a.location||''}</td><td>${a.riskIds?.join(',')||''}</td><td><button class="btn-outline" onclick="editAsset('${a.id}')">Edit</button> <button class="btn-outline" onclick="deleteAsset('${a.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }
function renderProcesses() { let html = `<div class="topbar"><div class="topbar-title">Business Processes</div><button class="btn" onclick="openModal('process')">+ Add Process</button></div><div class="content"><div class="table-container"><table><thead><tr><th>ID</th><th>Name</th><th>Owner</th><th>Assets</th><th>Risks</th><th>Actions</th></tr></thead><tbody>${data.processes.map(p=>`<tr><td>${p.id}</td><td>${p.name}</td><td>${p.owner}</td><td>${p.assets?.join(',')||''}</td><td>${p.risks?.join(',')||''}</td><td><button class="btn-outline" onclick="editProcess('${p.id}')">Edit</button> <button class="btn-outline" onclick="deleteProcess('${p.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }
function renderOrgUnits() { let html = `<div class="topbar"><div class="topbar-title">Org Structure</div><button class="btn" onclick="openModal('orgUnit')">+ Add Unit</button></div><div class="content"><div class="table-container"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Actions</th><tr></thead><tbody>${data.orgUnits.map(u=>`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.type}</td><td><button class="btn-outline" onclick="editOrgUnit('${u.id}')">Edit</button> <button class="btn-outline" onclick="deleteOrgUnit('${u.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }
function renderActionPlans() { let html = `<div class="topbar"><div class="topbar-title">Action Plans</div><button class="btn" onclick="openModal('actionPlan')">+ Add Action</button></div><div class="content"><div class="table-container"><table><thead><tr><th>ID</th><th>Title</th><th>Owner</th><th>Due Date</th><th>Progress</th><th>Status</th><th>Actions</th></tr></thead><tbody>${data.actionPlans.map(a=>`<tr><td>${a.id}</td><td>${a.title}</td><td>${a.owner}</td><td>${a.dueDate}</td><td>${a.progress}%</td><td>${a.status}</td><td><button class="btn-outline" onclick="editActionPlan('${a.id}')">Edit</button> <button class="btn-outline" onclick="deleteActionPlan('${a.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }
function renderIssues() { let html = `<div class="topbar"><div class="topbar-title">Issues</div><button class="btn" onclick="openModal('issue')">+ Add Issue</button></div><div class="content"><div class="table-container"><tr><thead><tr><th>ID</th><th>Title</th><th>Source</th><th>Priority</th><th>Owner</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>${data.issues.map(i=>`<tr><td>${i.id}</td><td>${i.title}</td><td>${i.source}</td><td>${i.priority}</td><td>${i.owner}</td><td>${i.dueDate}</td><td>${i.status}</td><td><button class="btn-outline" onclick="editIssue('${i.id}')">Edit</button> <button class="btn-outline" onclick="deleteIssue('${i.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }
function renderIncidents() { let html = `<div class="topbar"><div class="topbar-title">Incidents</div><button class="btn" onclick="openModal('incident')">+ Log Incident</button></div><div class="content"><div class="table-container"></table><thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Date</th><th>Status</th><th>Risk</th><th>Actions</th></tr></thead><tbody>${data.incidents.map(i=>`<tr><td>${i.id}</td><td>${i.title}</td><td>${i.type}</td><td>${i.date}</td><td>${i.status}</td><td>${i.riskId||''}</td><td><button class="btn-outline" onclick="editIncident('${i.id}')">Edit</button> <button class="btn-outline" onclick="deleteIncident('${i.id}')">Del</button></td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML = html; }

// Helper functions for other modules (Edit/Delete)
window.editAsset = function(id) { openModal('asset', data.assets.find(a=>a.id===id)); };
window.deleteAsset = function(id) { if(confirm('Delete asset?')) { data.assets = data.assets.filter(a=>a.id!==id); saveData(); renderAssets(); toast('Deleted'); } };
window.editProcess = function(id) { openModal('process', data.processes.find(p=>p.id===id)); };
window.deleteProcess = function(id) { if(confirm('Delete process?')) { data.processes = data.processes.filter(p=>p.id!==id); saveData(); renderProcesses(); toast('Deleted'); } };
window.editOrgUnit = function(id) { openModal('orgUnit', data.orgUnits.find(u=>u.id===id)); };
window.deleteOrgUnit = function(id) { if(confirm('Delete unit?')) { data.orgUnits = data.orgUnits.filter(u=>u.id!==id); saveData(); renderOrgUnits(); toast('Deleted'); } };
window.editActionPlan = function(id) { openModal('actionPlan', data.actionPlans.find(a=>a.id===id)); };
window.deleteActionPlan = function(id) { if(confirm('Delete action plan?')) { data.actionPlans = data.actionPlans.filter(a=>a.id!==id); saveData(); renderActionPlans(); toast('Deleted'); } };
window.editIssue = function(id) { openModal('issue', data.issues.find(i=>i.id===id)); };
window.deleteIssue = function(id) { if(confirm('Delete issue?')) { data.issues = data.issues.filter(i=>i.id!==id); saveData(); renderIssues(); toast('Deleted'); } };
window.editIncident = function(id) { openModal('incident', data.incidents.find(i=>i.id===id)); };
window.deleteIncident = function(id) { if(confirm('Delete incident?')) { data.incidents = data.incidents.filter(i=>i.id!==id); saveData(); renderIncidents(); toast('Deleted'); } };
window.editVendor = function(id) { openModal('vendor', data.vendors.find(v=>v.id===id)); };
window.deleteVendor = function(id) { if(confirm('Delete vendor?')) { data.vendors = data.vendors.filter(v=>v.id!==id); saveData(); renderVendors(); toast('Deleted'); } };
window.editComplianceItem = function(fw, req) { const item = data.compliance.find(c=>c.framework===fw && c.requirement===req); if(item) openModal('compliance', item); };
window.deleteComplianceItem = function(fw, req) { if(confirm('Delete compliance item?')) { data.compliance = data.compliance.filter(c=>!(c.framework===fw && c.requirement===req)); saveData(); renderCompliance(); toast('Deleted'); } };
window.editAuditFinding = function(id) { openModal('auditFinding', data.auditFindings.find(f=>f.id===id)); };
window.deleteAuditFinding = function(id) { if(confirm('Delete finding?')) { data.auditFindings = data.auditFindings.filter(f=>f.id!==id); saveData(); renderAuditFindings(); toast('Deleted'); } };
window.editEvidence = function(id) { openModal('evidence', data.evidence.find(e=>e.id===id)); };
window.deleteEvidence = function(id) { if(confirm('Delete evidence?')) { data.evidence = data.evidence.filter(e=>e.id!==id); saveData(); renderEvidence(); toast('Deleted'); } };
window.updateKRI = function(idx) { const newVal = parseInt(document.getElementById(`kriCurr-${idx}`).value); data.kris[idx].current = newVal; saveData(); renderKRIs(); toast('KRI updated'); };
window.deleteKRI = function(idx) { if(confirm('Delete KRI?')) { data.kris.splice(idx,1); saveData(); renderKRIs(); toast('Deleted'); } };
window.approveWorkflow = function(id) { const w = data.workflows.find(w=>w.id===id); if(w) { w.status='approved'; saveData(); renderWorkflow(); toast('Approved'); } };
window.deleteWorkflow = function(id) { if(confirm('Delete workflow item?')) { data.workflows = data.workflows.filter(w=>w.id!==id); saveData(); renderWorkflow(); toast('Deleted'); } };
window.exportReport = function() { const type = document.getElementById('reportType').value; let rows = []; if(type==='risk') rows = [['ID','Name','Category','Inherent','Residual','Rating','Owner','Status'], ...data.risks.map(r=>[r.id,r.name,r.category,r.inherentScore,r.residualScore,getRiskRating(r.inherentScore),r.owner,r.treatmentStatus])]; else if(type==='asset') rows = [['ID','Name','Type','Criticality','Owner'], ...data.assets.map(a=>[a.id,a.name,a.type,a.criticality,a.owner])]; else rows = [['ID','Name','Type','Effectiveness','Owner'], ...data.controls.map(c=>[c.id,c.name,c.type,c.effectiveness,c.owner])]; const csv = rows.map(row=>row.map(cell=>`"${cell}"`).join(',')).join('\n'); const blob = new Blob(["\uFEFF"+csv], {type:'text/csv'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${type}_report.csv`; a.click(); toast('Report downloaded'); };
window.changePassword = function() { const cur = document.getElementById('currentPwd').value; const newPwd = document.getElementById('newPwd').value; const conf = document.getElementById('confirmPwd').value; if(cur !== DEFAULT_PASS) { document.getElementById('pwdMsg').innerText = 'Current password incorrect'; return; } if(newPwd.length<4) { document.getElementById('pwdMsg').innerText = 'Minimum 4 characters'; return; } if(newPwd !== conf) { document.getElementById('pwdMsg').innerText = 'Passwords do not match'; return; } alert('Password changed (demo). Relogin with new password.'); sessionStorage.removeItem('grc_logged_in'); location.reload(); };

        form = `<div class="form-row"><div class="form-group"><label>Vendor Name</label><input id="venName" value="${v.name||''}"></div><div class="form-group"><label>ID</label><input id="venId" value="${v.id||`VEN-${data.vendors.length+1}`}"></div></div>
        <div class="form-row"><div class="form-group"><label>Service</label><input id="venService" value="${v.service||''}"></div><div class="form-group"><label>Criticality</label><select id="venCrit"><option ${v.criticality==='High'?'selected':''}>High</option><option ${v.criticality==='Medium'?'selected':''}>Medium</option><option ${v.criticality==='Low'?'selected':''}>Low</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Contract Expiry</label><input type="date" id="venExpiry" value="${v.contractExpiry||''}"></div><div class="form-group"><label>Assessment Score (0-100)</label><input type="number" id="venScore" value="${v.score||0}" min="0" max="100"></div></div>`;
    } else if(type === 'compliance') {
        const c = item || {};
        form = `<div class="form-row"><div class="form-group"><label>Framework</label><input id="compFw" value="${c.framework||''}"></div><div class="form-group"><label>Requirement</label><input id="compReq" value="${c.requirement||''}"></div></div>
        <div class="form-row"><div class="form-group"><label>Status</label><select id="compStatus"><option ${c.status==='Compliant'?'selected':''}>Compliant</option><option ${c.status==='Partial'?'selected':''}>Partial</option><option ${c.status==='Non-Compliant'?'selected':''}>Non-Compliant</option></select></div><div class="form-group"><label>Progress (%)</label><input type="number" id="compProg" value="${c.progress||0}"></div></div>
        <div class="form-row"><div class="form-group"><label>Owner</label><input id="compOwner" value="${c.owner||''}"></div><div class="form-group"><label>Due Date</label><input type="date" id="compDue" value="${c.dueDate||''}"></div></div>`;
    } else if(type === 'auditFinding') {
        const af = item || {};
        form = `<div class="form-row"><div class="form-group"><label>Finding Title</label><input id="auditTitle" value="${af.title||''}"></div><div class="form-group"><label>ID</label><input id="auditId" value="${af.id||`AUD-${data.auditFindings.length+1}`}"></div></div>
        <div class="form-row"><div class="form-group"><label>Severity</label><select id="auditSev"><option ${af.severity==='Critical'?'selected':''}>Critical</option><option ${af.severity==='High'?'selected':''}>High</option><option ${af.severity==='Medium'?'selected':''}>Medium</option><option ${af.severity==='Low'?'selected':''}>Low</option></select></div><div class="form-group"><label>Audit Type</label><select id="auditType"><option ${af.auditType==='Internal'?'selected':''}>Internal</option><option ${af.auditType==='External'?'selected':''}>External</option><option ${af.auditType==='Regulatory'?'selected':''}>Regulatory</option></select></div></div>
        <div class="form-row"><div class="form-group"><label>Status</label><select id="auditStatus"><option ${af.status==='Open'?'selected':''}>Open</option><option ${af.status==='In Progress'?'selected':''}>In Progress</option><option ${af.status==='Closed'?'selected':''}>Closed</option></select></div><div class="form-group"><label>Due Date</label><input type="date" id="auditDue" value="${af.dueDate||''}"></div></div>`;
    } else if(type === 'evidence') {
        const e = item || {};
        form = `<div class="form-row"><div class="form-group"><label>Evidence Name</label><input id="evName" value="${e.name||''}"></div><div class="form-group"><label>ID</label><input id="evId" value="${e.id||`EVD-${data.evidence.length+1}`}"></div></div>
        <div class="form-row"><div class="form-group"><label>Type</label><select id="evType"><option ${e.type==='Screenshot'?'selected':''}>Screenshot</option><option ${e.type==='Document'?'selected':''}>Document</option><option ${e.type==='Log'?'selected':''}>Log</option></select></div><div class="form-group"><label>Linked To (e.g., control ID)</label><input id="evLink" value="${e.linkedTo||''}"></div></div>
        <div class="form-group"><label>Upload Date</label><input type="date" id="evDate" value="${e.uploadDate||''}"></div>`;
    } else if(type === 'workflow') {
        form = `<div class="form-row"><div class="form-group"><label>Item Type</label><select id="wfType"><option>Risk</option><option>Control</option><option>Policy</option></select></div><div class="form-group"><label>Item Name</label><input id="wfName"></div></div>
        <div class="form-group"><label>Requestor</label><input id="wfRequestor" value="admin"></div>`;
    }
    document.getElementById('modalBody').innerHTML = form;
    document.getElementById('modal').classList.remove('hidden');
};
window.closeModal = function() { document.getElementById('modal').classList.add('hidden'); currentModalType=null; };
window.saveModal = function() {
    if(currentModalType === 'risk') {
        const newRisk = {
            id: document.getElementById('riskId').value,
            name: document.getElementById('riskName').value,
            description: document.getElementById('riskDesc').value,
            category: document.getElementById('riskCat').value,
            subCategory: document.getElementById('riskSubCat').value,
            businessUnit: document.getElementById('riskBU').value,
            department: document.getElementById('riskDept').value,
            owner: document.getElementById('riskOwner').value,
            dateIdentified: document.getElementById('riskDateId').value,
            lastReviewDate: document.getElementById('riskLastReview').value,
            likelihood: parseInt(document.getElementById('riskLik').value),
            impact: parseInt(document.getElementById('riskImp').value),
            inherentScore: parseInt(document.getElementById('riskLik').value) * parseInt(document.getElementById('riskImp').value),
            residualScore: parseInt(document.getElementById('riskRes').value),
            trend: document.getElementById('riskTrend').value,
            riskVelocity: document.getElementById('riskVel').value,
            confidenceLevel: document.getElementById('riskConf').value,
            treatmentStrategy: document.getElementById('riskTreatStrat').value,
            treatmentStatus: document.getElementById('riskTreatStatus').value,
            targetResidualScore: parseInt(document.getElementById('riskTargetRes').value),
            targetClosureDate: document.getElementById('riskTargetDate').value,
            riskAccepted: document.getElementById('riskAccepted').value,
            acceptedBy: document.getElementById('riskAcceptedBy').value
        };
        if(currentEditId) {
            const idx = data.risks.findIndex(r=>r.id===currentEditId);
            if(idx!==-1) data.risks[idx] = newRisk;
        } else data.risks.push(newRisk);
    } else if(currentModalType === 'control') {
        const newControl = {
            id: document.getElementById('ctrlId').value,
            name: document.getElementById('ctrlName').value,
            type: document.getElementById('ctrlType').value,
            effectiveness: parseInt(document.getElementById('ctrlEff').value),
            owner: document.getElementById('ctrlOwner').value,
            lastTested: document.getElementById('ctrlLastTested').value,
            linkedControls: document.getElementById('ctrlLinked').value,
            controlCount: parseInt(document.getElementById('ctrlCount').value),
            controlStatus: document.getElementById('ctrlStatus').value
        };
        if(currentEditId) {
            const idx = data.controls.findIndex(c=>c.id===currentEditId);
            if(idx!==-1) data.controls[idx] = newControl;
        } else data.controls.push(newControl);
    } else if(currentModalType === 'asset') {
        const newAsset = {
            id: document.getElementById('assetId').value,
            name: document.getElementById('assetName').value,
            type: document.getElementById('assetType').value,
            criticality: document.getElementById('assetCrit').value,
            owner: document.getElementById('assetOwner').value,
            location: document.getElementById('assetLoc').value,
            riskIds: document.getElementById('assetRisks').value.split(',').map(s=>s.trim()).filter(Boolean)
        };
        if(currentEditId) {
            const idx = data.assets.findIndex(a=>a.id===currentEditId);
            if(idx!==-1) data.assets[idx] = newAsset;
        } else data.assets.push(newAsset);
    } else if(currentModalType === 'process') {
        const newProc = {
            id: document.getElementById('procId').value,
            name: document.getElementById('procName').value,
            owner: document.getElementById('procOwner').value,
            assets: document.getElementById('procAssets').value.split(',').map(s=>s.trim()).filter(Boolean),
            risks: document.getElementById('procRisks').value.split(',').map(s=>s.trim()).filter(Boolean)
        };
        if(currentEditId) {
            const idx = data.processes.findIndex(p=>p.id===currentEditId);
            if(idx!==-1) data.processes[idx] = newProc;
        } else data.processes.push(newProc);
    } else if(currentModalType === 'orgUnit') {
        const newUnit = {
            id: document.getElementById('unitId').value,
            name: document.getElementById('unitName').value,
            type: document.getElementById('unitType').value
        };
        if(currentEditId) {
            const idx = data.orgUnits.findIndex(u=>u.id===currentEditId);
            if(idx!==-1) data.orgUnits[idx] = newUnit;
        } else data.orgUnits.push(newUnit);
    } else if(currentModalType === 'actionPlan') {
        const newAction = {
            id: document.getElementById('actId').value,
            title: document.getElementById('actTitle').value,
            owner: document.getElementById('actOwner').value,
            dueDate: document.getElementById('actDue').value,
            progress: parseInt(document.getElementById('actProgress').value),
            status: document.getElementById('actStatus').value,
            riskId: document.getElementById('actRiskId').value
        };
        if(currentEditId) {
            const idx = data.actionPlans.findIndex(a=>a.id===currentEditId);
            if(idx!==-1) data.actionPlans[idx] = newAction;
        } else data.actionPlans.push(newAction);
    } else if(currentModalType === 'issue') {
        const newIssue = {
            id: document.getElementById('issueId').value,
            title: document.getElementById('issueTitle').value,
            source: document.getElementById('issueSource').value,
            priority: document.getElementById('issuePriority').value,
            owner: document.getElementById('issueOwner').value,
            dueDate: document.getElementById('issueDue').value,
            status: document.getElementById('issueStatus').value,
            riskId: ""
        };
        if(currentEditId) {
            const idx = data.issues.findIndex(i=>i.id===currentEditId);
            if(idx!==-1) data.issues[idx] = newIssue;
        } else data.issues.push(newIssue);
    } else if(currentModalType === 'incident') {
        const newInc = {
            id: document.getElementById('incId').value,
            title: document.getElementById('incTitle').value,
            type: document.getElementById('incType').value,
            date: document.getElementById('incDate').value,
            status: document.getElementById('incStatus').value,
            riskId: document.getElementById('incRiskId').value
        };
        if(currentEditId) {
            const idx = data.incidents.findIndex(i=>i.id===currentEditId);
            if(idx!==-1) data.incidents[idx] = newInc;
        } else data.incidents.push(newInc);
    } else if(currentModalType === 'vendor') {
        const newVendor = {
            id: document.getElementById('venId').value,
            name: document.getElementById('venName').value,
            service: document.getElementById('venService').value,
            criticality: document.getElementById('venCrit').value,
            contractExpiry: document.getElementById('venExpiry').value,
            score: parseInt(document.getElementById('venScore').value)
        };
        if(currentEditId) {
            const idx = data.vendors.findIndex(v=>v.id===currentEditId);
            if(idx!==-1) data.vendors[idx] = newVendor;
        } else data.vendors.push(newVendor);
    } else if(currentModalType === 'compliance') {
        const newComp = {
            framework: document.getElementById('compFw').value,
            requirement: document.getElementById('compReq').value,
            status: document.getElementById('compStatus').value,
            progress: parseInt(document.getElementById('compProg').value),
            owner: document.getElementById('compOwner').value,
            dueDate: document.getElementById('compDue').value,
            mappedControls: []
        };
        const existing = data.compliance.find(c=>c.framework===newComp.framework && c.requirement===newComp.requirement);
        if(existing) {
            Object.assign(existing, newComp);
        } else {
            data.compliance.push(newComp);
        }
    } else if(currentModalType === 'auditFinding') {
        const newFinding = {
            id: document.getElementById('auditId').value,
            title: document.getElementById('auditTitle').value,
            severity: document.getElementById('auditSev').value,
            auditType: document.getElementById('auditType').value,
            status: document.getElementById('auditStatus').value,
            dueDate: document.getElementById('auditDue').value
        };
        if(currentEditId) {
            const idx = data.auditFindings.findIndex(f=>f.id===currentEditId);
            if(idx!==-1) data.auditFindings[idx] = newFinding;
        } else data.auditFindings.push(newFinding);
    } else if(currentModalType === 'evidence') {
        const newEv = {
            id: document.getElementById('evId').value,
            name: document.getElementById('evName').value,
            type: document.getElementById('evType').value,
            linkedTo: document.getElementById('evLink').value,
            uploadDate: document.getElementById('evDate').value
        };
        if(currentEditId) {
            const idx = data.evidence.findIndex(e=>e.id===currentEditId);
            if(idx!==-1) data.evidence[idx] = newEv;
        } else data.evidence.push(newEv);
    } else if(currentModalType === 'workflow') {
        const newWf = {
            id: `WF-${data.workflows.length+1}`,
            itemType: document.getElementById('wfType').value,
            itemName: document.getElementById('wfName').value,
            requestor: document.getElementById('wfRequestor').value,
            status: 'pending'
        };
        data.workflows.push(newWf);
    }
    saveData();
    closeModal();
    toast('Saved');
    renderCurrentPage();
};

// ----------------------------- NAVIGATION -----------------------------
let currentPage = "dashboard";
const modulePages = [
    "dashboard", "riskRegister", "riskAssessment", "controls",
    "assets", "processes", "orgUnits", "actionPlans",
    "issues", "incidents", "vendors", "compliance",
    "auditFindings", "evidence", "kris", "workflow",
    "auditTrail", "reports", "security"
];
const moduleLabels = {
    dashboard:"📊 Dashboard", riskRegister:"📋 Risk Register", riskAssessment:"📝 Risk Assessment & Treatment", controls:"🔒 Controls",
    assets:"🏷️ Asset Inventory", processes:"🔁 Business Processes", orgUnits:"🏢 Org Structure", actionPlans:"✅ Action Plans",
    issues:"❗ Issues", incidents:"🚨 Incidents", vendors:"🏭 Vendor Risk", compliance:"📜 Compliance",
    auditFindings:"🔍 Audit Findings", evidence:"📎 Evidence", kris:"📈 KRIs", workflow:"🔄 Workflow",
    auditTrail:"📜 Audit Trail", reports:"📑 Reports", security:"🔐 Security"
};
function renderCurrentPage() {
    switch(currentPage) {
        case "dashboard": renderDashboard(); break;
        case "riskRegister": renderRiskRegister(); break;
        case "riskAssessment": renderRiskAssessment(); break;
        case "controls": renderControls(); break;
        case "assets": renderAssets(); break;
        case "processes": renderProcesses(); break;
        case "orgUnits": renderOrgUnits(); break;
        case "actionPlans": renderActionPlans(); break;
        case "issues": renderIssues(); break;
        case "incidents": renderIncidents(); break;
        case "vendors": renderVendors(); break;
        case "compliance": renderCompliance(); break;
        case "auditFindings": renderAuditFindings(); break;
        case "evidence": renderEvidence(); break;
        case "kris": renderKRIs(); break;
        case "workflow": renderWorkflow(); break;
        case "auditTrail": renderAuditTrail(); break;
        case "reports": renderReports(); break;
        case "security": renderSecurity(); break;
        default: renderDashboard();
    }
}
function initApp() {
    const navContainer = document.getElementById('navContainer');
    navContainer.innerHTML = '';
    modulePages.forEach(page => {
        const btn = document.createElement('button');
        btn.className = 'nav-item' + (page === currentPage ? ' active' : '');
        btn.innerText = moduleLabels[page];
        btn.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            btn.classList.add('active');
            currentPage = page;
            renderCurrentPage();
        };
        navContainer.appendChild(btn);
    });
    renderCurrentPage();
}
window.editRisk = function(id) { openModal('risk', data.risks.find(r=>r.id===id)); };
window.deleteRisk = function(id) { if(confirm('Delete risk?')) { data.risks = data.risks.filter(r=>r.id!==id); saveData(); renderCurrentPage(); toast('Deleted'); } };
checkLogin();
</script>
